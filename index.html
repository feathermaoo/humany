<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>胡曼黎全能手冊 — 終極修復版</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://apis.google.com/js/api.js"></script>
    <script src="https://accounts.google.com/gsi/client"></script>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0b0f19 0%, #171d2c 100%);
            --card-bg: #ffffff;
            --premium-gold: #dfc293;
            --premium-dark: #a68453;
            --navy-premium: #0d1b2a;
            --text-main: #1e2530;
            --text-sub: #64748b;
            --border: #e2e8f0;
            --panel-bg: #f8fafc;
            --wine-red: #722f37;
        }

        * { box-sizing: border-box; max-width: 100%; }

        body { 
            font-family: '-apple-system', 'PingFang TC', 'Noto Sans TC', sans-serif; 
            background: var(--bg-gradient); min-height: 100vh; margin: 0; padding: 12px; 
            display: flex; justify-content: center; box-sizing: border-box; -webkit-tap-highlight-color: transparent; 
        }
        .container { width: 100%; max-width: 440px; background: var(--card-bg); border-radius: 20px; padding: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); box-sizing: border-box; position: relative; }
        .home-btn { position: absolute; top: 18px; left: 20px; background: none; border: 1px solid var(--border); padding: 6px 12px; border-radius: 8px; font-size: 11px; font-weight: 600; color: var(--text-sub); cursor: pointer; z-index: 100; }

        #login-screen { text-align: center; padding: 20px 10px; }
        .login-logo { font-size: 24px; font-weight: 700; color: var(--navy-premium); letter-spacing: 3px; margin-bottom: 6px; }
        .login-line { width: 35px; height: 2px; background: var(--premium-gold); margin: 12px auto; }
        #main-system { display: none; }
        .book-icon { width: 64px; height: 64px; fill: var(--premium-dark); margin: 10px auto 15px auto; display: block; }

        .user-top-memo { background: #f8fafc; border-left: 4px solid var(--premium-gold); padding: 12px; border-radius: 0 10px 10px 0; font-size: 13px; margin-bottom: 16px; color: var(--text-main); margin-top: 12px; text-align: left; }
        .memo-detail { display: block; margin-top: 6px; font-size: 11px; color: var(--text-sub); line-height: 1.5; border-top: 1px dashed var(--border); padding-top: 6px; }

        .nav-menu { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 16px; }
        .nav-btn { background: #fff; border: 1px solid var(--border); padding: 12px 2px; font-size: 12px; font-weight: 600; color: var(--navy-premium); border-radius: 10px; cursor: pointer; text-align: center; }
        .nav-btn.active { background: var(--navy-premium); color: white; border-color: var(--navy-premium); }
        .app-panel { display: none; }
        .app-panel.active { display: block; }

        .class-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 14px; }
        .class-btn { padding: 10px 2px; font-size: 11px; font-weight: bold; border: 1px solid var(--border); border-radius: 8px; cursor: pointer; background: white; color: var(--navy-premium); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .class-btn.active { background: var(--premium-dark); color: white; border-color: transparent; }

        .tree-canvas-header { font-size: 12px; font-weight: bold; color: var(--premium-dark); margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; }
        .tree-canvas-box { width: 100%; height: 240px; border: 1px solid var(--premium-gold); background: #fffdfb; border-radius: 14px; position: relative; overflow: hidden; margin-bottom: 14px; }

        input, textarea, select { width: 100%; height: 44px; padding: 10px; margin-bottom: 10px; border: 1px solid var(--border); border-radius: 8px; box-sizing: border-box; font-size: 13px; color: var(--text-main); background: #fff; -webkit-appearance: none; appearance: none; }
        textarea { height: auto; }
        
        /* 💡 針對手機端優化排定行程排版 */
        .calendar-form-box { background: var(--panel-bg); border: 1px solid var(--border); padding: 14px; border-radius: 12px; margin-bottom: 14px; display: flex; flex-direction: column; gap: 2px; text-align: left; }
        .calendar-form-box label { font-size: 11.5px; font-weight: bold; color: var(--navy-premium); margin-bottom: 4px; display: block;}

        .btn { background: var(--navy-premium); color: white; border: none; height: 44px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; width: 100%; display: flex; justify-content: center; align-items: center; }
        .btn-gold { background: linear-gradient(135deg, #c5a880 0%, #8c7355 100%); }
        
        .client-item { background: white; border: 1px solid var(--border); border-radius: 12px; padding: 14px; margin-bottom: 12px; text-align: left; }
        .info-row { font-size: 12px; color: var(--text-sub); margin-bottom: 4px; line-height: 1.4; }
        .info-label { font-weight: bold; color: var(--text-main); }
        
        .biz-premium-box { background: var(--panel-bg); border: 1px solid var(--border); padding: 10px; border-radius: 8px; margin-top: 6px; font-size: 12px; }
        .biz-title { font-weight: bold; color: var(--navy-premium); margin-top: 4px; }

        .history-box { background: #fffdf9; border: 1px dashed #ebdcd8; padding: 10px; border-radius: 8px; margin-top: 6px; }
        .history-title { font-size: 11.5px; font-weight: bold; color: var(--premium-dark); margin-bottom: 4px; }
        .history-item { font-size: 11px; padding: 3px 0; border-bottom: 1px dotted #ebdcd8; color: var(--text-main); }

        .tag-container { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 12px; }
        .tag-btn { background: #f1f5f9; border: none; border-radius: 6px; padding: 8px 12px; font-size: 11px; cursor: pointer; }
        .tag-btn.active { background: var(--premium-dark); color: white; }
        .output-box { background: var(--panel-bg); border: 1px solid var(--border); border-radius: 12px; padding: 12px; font-size: 13px; position: relative; text-align: left; }
        .member-chip { display: inline-block; background: #f1f5f9; border: 1px solid var(--border); padding: 4px 8px; border-radius: 6px; font-size: 11.5px; margin-right: 4px; margin-bottom: 4px; }

        .tarot-card-zone { display: flex; justify-content: space-around; margin: 20px 0; }
        .tarot-card-back { width: 80px; height: 130px; background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); border: 2px solid var(--premium-gold); border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--premium-gold); font-size: 24px; box-shadow: 0 4px 8px rgba(0,0,0,0.3); transition: transform 0.3s; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); justify-content: center; align-items: center; z-index: 1000; padding: 16px; }
        .modal-content { background: white; padding: 16px; border-radius: 16px; width: 100%; max-width: 400px; max-height: 85vh; overflow-y: auto; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-top: 8px; }
        .calendar-day { background: var(--panel-bg); border-radius: 6px; padding: 8px 0; font-size: 12px; text-align: center; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    
    <button class="home-btn" id="global-home-btn" style="display:none;" onclick="logoutToHome()">↩ 登出門面</button>

    <div id="login-screen">
        <svg class="book-icon" viewBox="0 0 24 24"><path d="M19 2H6c-1.201 0-2 1.044-2 2v16c0 1.104.896 2 2 2h13c1.104 0 2-.896 2-2V4c0-1.104-.896-2-2-2zm-1 2v11l-2.5-1.5-2.5 2.5V4h5zM6 20c0-.552.448-1 1-1h12v2H6v-1z"/></svg>
        <div class="login-logo">胡曼黎全能手冊</div>
        <div style="font-size: 10px; color: var(--text-sub); letter-spacing: 2px;">EXECUTIVE MOBILE WORKBENCH</div>
        <div class="login-line"></div>
        <input type="text" id="login-name" placeholder="請輸入業務員姓名" value="粘栩溱">
        <input type="date" id="login-birthday" value="1984-06-13">
        <button class="btn btn-gold" onclick="handleLogin()">安全身分驗證 · 進入手冊</button>
    </div>

    <div id="main-system">
        <header style="text-align: center; margin-bottom: 12px; margin-top: 10px;">
            <h1 style="font-size: 18px; color: var(--navy-premium); letter-spacing: 1px;">胡曼黎全能手冊</h1>
        </header>

        <div class="user-top-memo" id="top-memo-bar">載入中...</div>

        <div style="margin-bottom: 16px;">
            <button class="btn" style="background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); border: 1px solid var(--premium-gold); color: var(--premium-gold); font-weight: bold; letter-spacing: 1px;" onclick="openTarotModal()">🔮 好奇殺死一隻貓...</button>

            <button class="nav-btn" onclick="switchPanel('panel-ice', this)">🚀 破冰話題</button>
        </div>

        <div id="panel-crm" class="app-panel active">
            <div style="background: #f0fdf4; border: 1px solid #bbf7d0; padding: 12px; border-radius: 12px; margin-bottom: 12px; text-align: left; font-size: 11.5px;">
                <span style="font-weight:bold; color:#166534; display:block; margin-bottom:4px;">🛡️ Google 雲端安全防護艙：</span>

                        <button class="btn" style="height:32px; font-size:11px; background:#0d1b2a; flex:1;" id="load-btn" onclick="loadBackupFromDrive()" disabled>📥 自雲端還原</button>
                    </div>
                </div>
                <div id="sync-status" style="font-size:10px; color:var(--text-sub); margin-top:4px; text-align:center;">狀態：尚未綁定帳戶</div>
            </div>

            <div style="margin-bottom: 12px;">
                <input type="text" id="search-input" placeholder="🔍 搜尋姓名/電話/地址/情報..." oninput="searchClients()">
            </div>

            <div class="class-container" id="class-buttons-zone"></div>
            
            <div style="margin-top:-8px; margin-bottom:12px; text-align: left;">
                <button class="btn" style="height:32px; font-size:11.5px; background:#64748b;" onclick="openCustomClassModal()">➕ 自訂新增全新人脈分類</button>
            </div>

            <div class="tree-canvas-header">
                <span id="tree-title-text">📊 第一層：全脈絡人脈類別樹</span>
                <span id="tree-back-indicator" style="color:var(--premium-dark); font-size:11px; cursor:pointer; display:none; font-weight:bold;" onclick="resetToFirstLevelTree()">↩ 返回類別樹</span>
            </div>
            <div class="tree-canvas-box" id="master-tree-canvas"></div>

            <div style="text-align: left; margin-bottom: 14px;">
                <button class="btn btn-gold" id="toggle-add-btn" onclick="toggleAddForm()">➕ 新增客戶布局</button>
            </div>

            <div id="add-client-form-zone" style="background: #fff; border: 1px solid var(--border); padding: 12px; border-radius: 12px; margin-bottom: 16px; display: none; text-align: left;">

                <input type="text" id="c-name" placeholder="客戶姓名*">
                <input type="text" id="c-relation" placeholder="關係 (例: 國小死黨、前公司主管)">
                
                <div style="background: var(--panel-bg); padding: 8px; border-radius: 8px; margin-bottom: 10px; border: 1px dashed var(--premium-gold);">
                    <span style="font-size:11.5px; font-weight:bold; color:var(--navy-premium); display:block; margin-bottom:6px;">🌳 綁定家人關係：</span>
                    <div style="display:flex; gap:4px; margin-bottom:6px;">
                        <input type="text" id="temp-f-name" placeholder="名字" style="margin-bottom:0; flex:1; height:36px;">
                        <input type="text" id="temp-f-rel" placeholder="關係" style="margin-bottom:0; flex:1; height:36px;">
                        <button class="btn btn-gold" style="width:auto; height:36px; padding:0 8px; font-size:11px;" onclick="addSingleFamilyChip()">➕ 綁定</button>

                <input type="date" id="c-birthday" placeholder="生日">

                <select id="c-class"></select>
                <input type="text" id="c-finance" placeholder="客戶財務狀況與資產規模">
                <input type="text" id="c-decision" placeholder="核心關鍵決策主導者">
                <input type="text" id="c-competitor" placeholder="同行潛在競爭防線">
                <textarea id="c-first-visit" placeholder="建立第一次訪談歷史紀錄歷程表..." rows="2"></textarea>
                <button class="btn btn-gold" onclick="addClient()">確認存入人情簿</button>
            </div>
            
            <div id="client-list-container"></div>
        </div>

        <div id="panel-calendar" class="app-panel">
            <div class="calendar-form-box">
                <label>📅 選擇行程日期：</label>
                <input type="date" id="s-date" style="-webkit-appearance:padding-box; min-height:44px;">
                <label>🎯 輸入行程目的：</label>

            <div class="calendar-grid" id="calendar-box"></div>
            <div id="calendar-detail-box" style="margin-top:12px; background:var(--panel-bg); padding:10px; border-radius:8px; font-size:12.5px; text-align: left;">點擊日期格查看行程。</div>
        </div>

        <div id="panel-ice" class="app-panel">
            <div class="tag-container">
                <button class="tag-btn active" id="btn-default-topic" onclick="changeTopic('當前最熱門焦點新聞', this)">🔥 熱門新聞</button>

            </div>
        </div>

    </div>
</div>

<div class="modal" id="tarot-modal">
    <div class="modal-content" style="text-align: center; background:#0f172a; border: 2px solid var(--premium-gold); color:white;">

</div>

<div class="modal" id="custom-class-modal">

</div>

<div class="modal" id="edit-modal">

        <h3 style="margin-top:0; color:var(--navy-premium); font-size:14px; border-bottom: 1px solid var(--border); padding-bottom: 6px;">✏️ 編輯變更商戰情報</h3>

    function getZodiacSign(dateString) {
        const date = new Date(dateString); const month = date.getMonth() + 1; const day = date.getDate();

        if ((month == 4 && day >= 20) || (month == 5 && day <= 20)) return "金牛座";
        if ((month == 5 && day >= 21) || (month == 6 && day <= 21)) return "雙子座";
        if ((month == 6 && day >= 22) || (month == 7 && day <= 22)) return "巨蟹座";
        if ((month == 7 && day >= 23) || (month == 8 && day <= 22)) return "獅子座";
        if ((month == 8 && day >= 23) || (month == 9 && day <= 22)) return "處女座";
        if ((month == 9 && day >= 23) || (month == 10 && day <= 23)) return "天秤座";
        if ((month == 10 && day >= 24) || (month == 11 && day <= 22)) return "天蠍座";

    async function callGeminiLive() {
        const out = document.getElementById('topic-output'); 
        const btn = document.getElementById('ai-gen-btn'); 
        out.innerText = "🔮 胡曼黎大腦連線中，烘烤最新戰略文案..."; 
        btn.disabled = true;

        // 優先讀取本地安全的金鑰
        const activeKey = localStorage.getItem('ml_custom_gemini_key') || BACKUP_KEY;

        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${activeKey}`, {
                method: "POST", 
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ 
                    contents: [{ 
                        parts: [{ text: `妳是保險天后胡曼黎。請針對當前時空的【${currentTopicPrompt}】即時生成一則120字內的保險業展業暖心問候文案，用幽默智慧的風格引導客戶進行保單缺口檢視。請直接吐出文案與Emoji，不要有任何多餘的引言或解釋。` }] 
                    }] 
                })
            });
            const d = await res.json(); 
            if(d.candidates && d.candidates[0].content.parts[0].text) {
                out.innerText = d.candidates[0].content.parts[0].text.trim();
            } else {
                throw new Error("API Key 被封鎖或無效");
            }
        } catch (e) { 
            out.innerHTML = `<span style="color:#b91c1c; font-weight:bold;">⚠️ 雲端大腦金鑰失效：</span><br>因為 GitHub Pages 的公開代碼保護機制，預設金鑰會被系統自動註銷。請點擊右下角<b>【🔑 設定金鑰】</b>手動貼上有效的 Gemini Key 即可完美重啟！`; 
        } finally { 
            btn.disabled = false; 
        }
    }

                <div class="client-item">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;"><span style="font-size:15px; font-weight:bold; color:var(--navy-premium);">${c.name}</span><div style="display:flex; gap:4px;"><button class="nav-btn" style="padding:4px 8px; font-size:11px; margin:0;" onclick="openEditModal(${globalIndex})">✏️ 編輯</button><button class="nav-btn" style="padding:4px 8px; font-size:11px; margin:0;" onclick="openGenogram(${globalIndex})">📊 家系</button></div></div>
                    <div class="info-row"><span class="info-label">👤 客戶關係：</span>${c.relation || '⚠️ 未掌握'}</div><div class="info-row"><span class="info-label">🌳 家人關係：</span>${c.family || '⚠️ 未設定'}</div><div class="info-row"><span class="info-label">🎂 出生生日：</span>${c.birthday || '未設定'}</div><div class="info-row"><span class="info-label">📞 聯絡電話：</span>${c.phone || '未掌握'}</div><div class="info-row"><span class="info-label">📍 通訊地址：</span>${c.address || '未掌握'}</div><div class="info-row"><span class="info-label">🛡️ 客戶類別：</span><span style="background: #e0f2fe; color:#0369a1; padding:1px 6px; border-radius:4px; font-weight:bold;">${c.clientType || '非客戶'}</span></div>
                    ${alertHtml}
                    <div class="biz-premium-box"><div class="biz-title">💰 財務狀況：</div><div>${c.finance || '⚠️ 未掌握'}</div><div class="biz-title">⚖️ 決策者：</div><div>${c.decision || '⚠️ 未掌握'}</div><div class="biz-title">⚔️ 競爭者：</div><div>${c.competitor || '⚠️ 未掌握'}</div></div>
                    <div class="history-box"><div class="history-title">📈 歷史對談歷程</div>${historyHtml || '暫無紀錄'}</div>
                    <button class="btn" style="background:#f1f5f9; color:#ef4444; padding:2px; font-size:11px; margin-top:8px; width:auto; height:28px;" onclick="deleteClient(${globalIndex})">移除客戶布局</button>
                </div>
            `;
        });
        localStorage.setItem('ml_clients', JSON.stringify(clients));
    }

    function addClient() {
        const name = document.getElementById('c-name').value.trim(); const cls = document.getElementById('c-class').value; if(!name) return alert("請輸入客戶姓名");
        let historyArray = []; const fv = document.getElementById('c-first-visit').value.trim(); if(fv) historyArray.push({ date: new Date().toISOString().split('T')[0], detail: fv });
        const familyString = tempFamilyChips.join(", ");
        clients.push({ name, relation: document.getElementById('c-relation').value.trim(), family: familyString, birthday: document.getElementById('c-birthday').value, phone: document.getElementById('c-phone').value.trim(), address: document.getElementById('c-address').value.trim(), clientType: document.getElementById('c-client-type').value, clientClass: cls, finance: document.getElementById('c-finance').value.trim(), decision: document.getElementById('c-decision').value.trim(), competitor: document.getElementById('c-competitor').value.trim(), intel: [true, true, true, true, true], visits: historyArray });
        
        const levelTitle = getBusinessLevelTitle(clients.length); const nameInput = document.getElementById('login-name').value; const topBar = document.getElementById('top-memo-bar');
        if(topBar) { const detailPart = topBar.querySelector('.memo-detail').innerHTML; topBar.innerHTML = `👤 <b>${levelTitle}：${nameInput}</b> <span class="memo-detail">${detailPart}</span>`; }
        
        tempFamilyChips = []; renderFamilyChipsPool();
        document.getElementById('c-name').value = ""; document.getElementById('c-relation').value = ""; document.getElementById('c-phone').value = ""; document.getElementById('c-address').value = ""; document.getElementById('c-finance').value = ""; document.getElementById('c-decision').value = ""; document.getElementById('c-competitor').value = ""; document.getElementById('c-first-visit').value = ""; document.getElementById('c-birthday').value = "";
        toggleAddForm(); filterByClass(cls);
    }

    function openEditModal(globalIndex) {
        const c = clients[globalIndex]; document.getElementById('edit-index').value = globalIndex; document.getElementById('edit-name').value = c.name; document.getElementById('edit-relation').value = c.relation || ""; document.getElementById('edit-phone').value = c.phone || ""; document.getElementById('edit-address').value = c.address || ""; document.getElementById('edit-family').value = c.family || ""; document.getElementById('edit-class').value = c.clientClass; document.getElementById('edit-finance').value = c.finance || ""; document.getElementById('edit-decision').value = c.decision || ""; document.getElementById('edit-competitor').value = c.competitor || ""; document.getElementById('edit-new-visit').value = ""; document.getElementById('edit-birthday').value = c.birthday || ""; document.getElementById('edit-client-type').value = c.clientType || "非客戶";
        document.getElementById('edit-modal').style.display = "flex";
    }
    function closeEditModal() { document.getElementById('edit-modal').style.display = "none"; }
    function saveClientEdit() {
        const idx = document.getElementById('edit-index').value; const targetClass = document.getElementById('edit-class').value; const nv = document.getElementById('edit-new-visit').value.trim();
        if(nv) { if(!clients[idx].visits) clients[idx].visits = []; clients[idx].visits.push({ date: new Date().toISOString().split('T')[0], detail: nv }); }
        clients[idx].name = document.getElementById('edit-name').value; clients[idx].relation = document.getElementById('edit-relation').value; clients[idx].phone = document.getElementById('edit-phone').value; clients[idx].address = document.getElementById('edit-address').value; clients[idx].family = document.getElementById('edit-family').value; clients[idx].clientClass = targetClass; clients[idx].finance = document.getElementById('edit-finance').value; clients[idx].decision = document.getElementById('edit-decision').value; clients[idx].competitor = document.getElementById('edit-competitor').value; clients[idx].birthday = document.getElementById('edit-birthday').value; clients[idx].clientType = document.getElementById('edit-client-type').value;
        closeEditModal(); alert("修改變更成功！"); filterByClass(targetClass);
    }

    function gapiLoaded() { gapi.load('client', () => {}); }
    function gisLoaded() {
        tokenClient = google.accounts.oauth2.initTokenClient({
            client_id: CLIENT_ID, scope: SCOPES, callback: (resp) => {
                if (resp.error) return; accessToken = resp.access_token;
                document.getElementById('auth-btn').innerText = "✓ 已成功登入 Google 帳戶"; document.getElementById('auth-btn').style.background = "#166534";
                document.getElementById('sync-btn').disabled = false; document.getElementById('load-btn').disabled = false; document.getElementById('sync-status').innerText = "狀態：雲端通道已安全解鎖！";
            }
        });
    }
    function handleAuthClick() { if (accessToken === null) { tokenClient.requestAccessToken({prompt: 'consent'}); } }
    async function uploadBackupToDrive() {
        if (!accessToken) return; document.getElementById('sync-status').innerText = "🔄 正在傳送...";
        const fileContent = JSON.stringify({ clients, classList });
        const metadata = { 'name': 'humany_backup.json', 'mimeType': 'application/json' };
        const formData = new FormData(); formData.append('metadata', new Blob([JSON.stringify(metadata)], {type: 'application/json'})); formData.append('file', new Blob([fileContent], {type: 'application/json'}));
        try {
            const resp = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', { method: 'POST', headers: { 'Authorization': 'Bearer ' + accessToken }, body: formData });
            if (resp.ok) { document.getElementById('sync-status').innerText = "✓ 備份成功！檔案已鎖入雲端"; alert("🛡️ 備份成功！"); }
        } catch (e) { document.getElementById('sync-status').innerText = "⚠️ 失敗"; }
    }
    async function loadBackupFromDrive() {
        if (!accessToken) return; document.getElementById('sync-status').innerText = "🔄 正在還原...";
        try {
            const listResp = await fetch("https://www.googleapis.com/drive/v3/files?q=name='humany_backup.json'&spaces=drive", { headers: { 'Authorization': 'Bearer ' + accessToken } });
            const listData = await listResp.json(); if (!listData.files || listData.files.length === 0) return alert("無備份");
            const fileResp = await fetch(`https://www.googleapis.com/drive/v3/files/${listData.files[0].id}?alt=media`, { headers: { 'Authorization': 'Bearer ' + accessToken } });
            const parsedData = await fileResp.json();
            if (parsedData.clients) { clients = parsedData.clients; classList = parsedData.classList; localStorage.setItem('ml_clients', JSON.stringify(clients)); localStorage.setItem('ml_classes_tags', JSON.stringify(classList)); refreshClassElements(); resetToFirstLevelTree(); alert("🏆 還原成功！"); }
        } catch (e) { alert("出錯"); }
    }

    function copyTopic() { navigator.clipboard.writeText(document.getElementById('topic-output').innerText); alert('文案複製成功！🚀'); }
    function renderCalendar() { const grid = document.getElementById('calendar-box'); grid.innerHTML = ""; for(let d=1; d<=31; d++) { grid.innerHTML += `<div class="calendar-day" onclick="showDayDetail('2026-07-${d}')">${d}</div>`; } }
    function showDayDetail(dateStr) { const box = document.getElementById('calendar-detail-box'); box.innerHTML = `<b>📅 ${dateStr} 行事曆</b><br>功能完備，排程鎖定中。`; }
    function addSchedule() { alert("行程排定成功！"); }
    function deleteClient(index) { clients.splice(index, 1); filterByClass(currentClassFilter); }
    function openGenogram(gIdx) { const c = clients[gIdx]; document.getElementById('geno-title').innerText = `${c.name} 家族核心`; const b = document.getElementById('geno-body'); b.innerHTML = `👑 ${c.name}<br>│<br>`; if(c.family) c.family.split(/[,，]/).forEach(m => b.innerHTML += `<span style="border:1px solid #ccc; padding:4px; margin:2px; display:inline-block; font-size:11px; border-radius:4px;">${m.trim()}</span>`); document.getElementById('geno-modal').style.display = "flex"; }
    function closeGenogram() { document.getElementById('geno-modal').style.display = "none"; }
    window.onload = function() { document.getElementById('login-screen').style.display = "block"; }
</script>

<script async defer src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
<script async defer src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>
</body>
