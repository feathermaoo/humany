<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>胡曼黎全能手冊 — 白金行動版</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0b0f19 0%, #171d2c 100%);
            --card-bg: #ffffff;
            --premium-gold: #dfc293;
            --premium-dark: #a68453;
            --navy-premium: #0d1b2a;
            --text-main: #1e2530;
            --text-sub: #64748b;
            --border: #e2e8f0;
            --panel-bg: #f8fafc;
        }

        body { 
            font-family: '-apple-system', 'PingFang TC', 'Noto Sans TC', sans-serif; 
            background: var(--bg-gradient); 
            min-height: 100vh; 
            margin: 0; 
            padding: 12px; 
            display: flex; 
            justify-content: center; 
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        .container { 
            width: 100%; 
            max-width: 440px; 
            background: var(--card-bg); 
            border-radius: 20px; 
            padding: 20px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.4); 
            box-sizing: border-box; 
            position: relative; 
        }
        
        .home-btn { 
            position: absolute; top: 18px; left: 20px; background: none; border: 1px solid var(--border); 
            padding: 6px 12px; border-radius: 8px; font-size: 11px; font-weight: 600; color: var(--text-sub); cursor: pointer; z-index: 100; 
        }

        #login-screen { text-align: center; padding: 30px 10px; }
        .login-logo { font-size: 24px; font-weight: 700; color: var(--navy-premium); letter-spacing: 3px; margin-bottom: 6px; margin-top: 15px; }
        .login-line { width: 35px; height: 2px; background: var(--premium-gold); margin: 12px auto; }
        #main-system { display: none; }

        /* 💡 業務員生命靈數備忘樣式優化 (強制斷行 + 字體略小呈現) */
        .user-top-memo { 
            background: #f8fafc; border-left: 4px solid var(--premium-gold); 
            padding: 12px; border-radius: 0 10px 10px 0; font-size: 13px; 
            margin-bottom: 16px; color: var(--text-main); margin-top: 12px; 
        }
        .memo-detail {
            display: block; margin-top: 6px; font-size: 11px; color: var(--text-sub); line-height: 1.5; border-top: 1px dashed var(--border); padding-top: 6px;
        }

        .nav-menu { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 16px; }
        .nav-btn { background: #fff; border: 1px solid var(--border); padding: 12px 2px; font-size: 12px; font-weight: 600; color: var(--navy-premium); border-radius: 10px; cursor: pointer; text-align: center; }
        .nav-btn.active { background: var(--navy-premium); color: white; border-color: var(--navy-premium); }
        .app-panel { display: none; }
        .app-panel.active { display: block; }

        /* 人脈標籤優化 */
        .class-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 14px; }
        .class-btn { padding: 10px 2px; font-size: 12px; font-weight: bold; border: 1px solid var(--border); border-radius: 8px; cursor: pointer; background: white; color: var(--navy-premium); transition: all 0.2s; }
        .class-btn.active { background: var(--premium-dark); color: white; border-color: transparent; }

        .tree-canvas-header { font-size: 12px; font-weight: bold; color: var(--premium-dark); margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; }
        .tree-canvas-box { width: 100%; height: 240px; border: 1px solid var(--premium-gold); background: #fffdfb; border-radius: 14px; position: relative; overflow: hidden; margin-bottom: 14px; }

        /* 手機行動端黃金高度輸入框與按鈕 (44px) */
        input, textarea, select { width: 100%; height: 44px; padding: 10px; margin-bottom: 10px; border: 1px solid var(--border); border-radius: 8px; box-sizing: border-box; font-size: 13px; color: var(--text-main); }
        textarea { height: auto; }
        .btn { background: var(--navy-premium); color: white; border: none; height: 44px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; width: 100%; display: flex; justify-content: center; align-items: center; }
        .btn-gold { background: linear-gradient(135deg, #c5a880 0%, #8c7355 100%); }
        
        .client-item { background: white; border: 1px solid var(--border); border-radius: 12px; padding: 14px; margin-bottom: 12px; }
        .info-row { font-size: 12px; color: var(--text-sub); margin-bottom: 4px; }
        .info-label { font-weight: bold; color: var(--text-main); }
        
        .intel-badge { display: inline-block; padding: 2px 6px; font-size: 10.5px; border-radius: 4px; margin-right: 4px; margin-bottom: 4px; font-weight: bold; }
        .intel-yes { background: #e2fcdb; color: #166534; }
        .intel-no { background: #fee2e2; color: #991b1b; border: 1px dashed #ef4444; }
        
        .biz-premium-box { background: var(--panel-bg); border: 1px solid var(--border); padding: 10px; border-radius: 8px; margin-top: 6px; font-size: 12px; }
        .biz-title { font-weight: bold; color: var(--navy-premium); margin-top: 4px; }

        .history-box { background: #fffdf9; border: 1px dashed #ebdcd8; padding: 10px; border-radius: 8px; margin-top: 6px; }
        .history-title { font-size: 11.5px; font-weight: bold; color: var(--premium-dark); margin-bottom: 4px; }
        .history-item { font-size: 11px; padding: 3px 0; border-bottom: 1px dotted #ebdcd8; color: var(--text-main); }

        .tag-container { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 12px; }
        .tag-btn { background: #f1f5f9; border: none; border-radius: 6px; padding: 8px 12px; font-size: 11px; cursor: pointer; }
        .tag-btn.active { background: var(--premium-dark); color: white; }
        .output-box { background: var(--panel-bg); border: 1px solid var(--border); border-radius: 12px; padding: 12px; font-size: 13px; position: relative; }

        /* 關係人堆疊小積木區 */
        .member-chip { display: inline-block; background: #f1f5f9; border: 1px solid var(--border); padding: 4px 8px; border-radius: 6px; font-size: 11.5px; margin-right: 4px; margin-bottom: 4px; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); justify-content: center; align-items: center; z-index: 1000; padding: 16px; box-sizing: border-box; }
        .modal-content { background: white; padding: 16px; border-radius: 16px; width: 100%; max-width: 400px; max-height: 85vh; overflow-y: auto; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-top: 8px; }
        .calendar-day { background: var(--panel-bg); border-radius: 6px; padding: 8px 0; font-size: 12px; text-align: center; cursor: pointer; }
        .calendar-day.has-event::after { content: ''; width: 4px; height: 4px; background: var(--premium-dark); border-radius: 50%; display: block; margin: 2px auto 0 auto; }
    </style>
</head>
<body>

<div class="container">

    <div id="login-screen">

        <div id="panel-crm" class="app-panel active">

            <div class="class-container" id="class-buttons-zone">
                </div>
            
            <div style="margin-top:-8px; margin-bottom:12px;">

            <div class="tree-canvas-header">

                    <span style="font-size:11.5px; font-weight:bold; color:var(--navy-premium); display:block; margin-bottom:6px;">🌳 一個一個輸入綁定家人關係：</span>
                    <div style="display:flex; gap:4px; margin-bottom:6px;">

                    </div>
                    <div id="family-chips-pool" style="min-height:20px;"></div>
                </div>

                <select id="c-class">
                    </select>
                
                <input type="text" id="c-finance" placeholder="客戶財務狀況與資產規模">
                <input type="text" id="c-decision" placeholder="核心關鍵決策主導者">
                <input type="text" id="c-competitor" placeholder="同行潛在競爭防線">
                
                <b style="font-size:11px; color:var(--navy-premium); display:block; margin-bottom:4px;">🎯 情報力五向度現狀勾選：</b>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:4px; font-size:11px; margin-bottom:10px; background:var(--panel-bg); padding:6px; border-radius:6px;">
                    <label><input type="checkbox" id="i-1" style="width:auto; height:auto; margin-bottom:0;"> 1.背景性格</label>
                    <label><input type="checkbox" id="i-2" style="width:auto; height:auto; margin-bottom:0;"> 2.家系人脈</label>

                    <label><input type="checkbox" id="i-5" style="width:auto; height:auto; margin-bottom:0;"> 5.競爭防線</label>
                </div>
                <textarea id="c-first-visit" placeholder="建立第一次訪談歷史紀錄歷程表..." rows="2"></textarea>
                <button class="btn btn-gold" onclick="addClient()">確認存入人情簿</button>
            </div>
            
            <div id="client-list-container"></div>
        </div>

        <div id="panel-calendar" class="app-panel">

            </div>
            <div class="calendar-grid" id="calendar-box"></div>
            <div id="calendar-detail-box" style="margin-top:12px; background:var(--panel-bg); padding:10px; border-radius:8px; font-size:12.5px;">點擊日期格查看行程。</div>
        </div>

        <div id="panel-ice" class="app-panel">
            <div class="tag-container">
                <button class="tag-btn active" onclick="changeTopic('當前最熱門焦點新聞', this)">🔥 熱門新聞</button>
                <button class="tag-btn" onclick="changeTopic('今天最新的即時氣候變化與暖心關懷問候', this)">☀️ 當日天氣</button>
                <button class="tag-btn" onclick="changeTopic('目前的醫療險改革與實支實付限額停售改制等最新保險議題', this)">💼 保險議題</button>

            <div class="output-box">

                <div style="position:absolute; bottom:8px; right:8px; display:flex; gap:6px;">
                    <button class="btn" id="ai-gen-btn" style="padding:4px 8px; font-size:11px; background:var(--navy-premium); height:32px; width:auto;" onclick="callGeminiLive()">⚡️ 重新生成</button>
                    <button class="btn btn-gold" style="padding:4px 8px; font-size:11px; width:auto; height:32px;" onclick="copyTopic()">複製</button>
                </div>
            </div>
        </div>

    </div>
</div>

<div class="modal" id="custom-class-modal">
    <div class="modal-content">
        <h3 style="margin-top:0; color:var(--navy-premium); font-size:14px;">➕ 新增自訂人脈標籤類別</h3>
        <input type="text" id="new-class-input" placeholder="例如: 高爾夫球友、扶輪社">
        <div style="display:flex; gap:6px;">
            <button class="btn btn-gold" onclick="saveCustomClass()">確定建立</button>
            <button class="btn" style="background:#64748b;" onclick="closeCustomClassModal()">取消</button>
        </div>
    </div>
</div>

<div class="modal" id="edit-modal">
    <div class="modal-content">
        <h3 style="margin-top:0; color:var(--navy-premium); font-size:14px; border-bottom: 1px solid var(--border); padding-bottom: 6px;">✏️ 編輯變更商戰情報</h3>
        <input type="hidden" id="edit-index">

        <input type="text" id="edit-phone" placeholder="電話">
        <input type="text" id="edit-address" placeholder="地址">

        <input type="text" id="edit-decision" placeholder="決策核心">
        <input type="text" id="edit-competitor" placeholder="同行競爭">
        <div style="font-size:11px; background:var(--panel-bg); padding:6px; border-radius:6px; margin-bottom:10px;">
            <label><input type="checkbox" id="e-i-1" style="width:auto; height:auto;"> 1.背景地雷</label> | <label><input type="checkbox" id="e-i-2" style="width:auto; height:auto;"> 2.家系人脈</label><br>
            <label><input type="checkbox" id="e-i-3" style="width:auto; height:auto;"> 3.財務資產</label> | <label><input type="checkbox" id="e-i-4" style="width:auto; height:auto;"> 4.決策歸屬</label><br>

        </div>
        <textarea id="edit-new-visit" placeholder="追加新的面談、定檢紀錄歷程..." rows="2"></textarea>
        <div style="display:flex; gap:6px; margin-top:8px;"><button class="btn btn-gold" onclick="saveClientEdit()">儲存變更</button><button class="btn" style="background:#64748b;" onclick="closeEditModal()">取消</button></div>
    </div>
</div>

    function logoutToHome() { document.getElementById('main-system').style.display = "none"; document.getElementById('global-home-btn').style.display = "none"; document.getElementById('login-screen').style.display = "block"; currentClassFilter = ''; }
    function init() { drawFirstLevelTree(); renderClients(clients); renderCalendar(); }
    function switchPanel(panelId, btn) { document.querySelectorAll('.app-panel').forEach(p => p.classList.remove('active')); document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active')); document.getElementById(panelId).classList.add('active'); btn.classList.add('active'); if(panelId === 'panel-ice') changeTopic('當前最熱門焦點新聞', document.querySelector('.tag-btn')); }

    // 💡 修正 3：自訂新增人脈分類控制
    function openCustomClassModal() { document.getElementById('custom-class-modal').style.display = "flex"; }
    function closeCustomClassModal() { document.getElementById('custom-class-modal').style.display = "none"; document.getElementById('new-class-input').value = ""; }
    function saveCustomClass() {
        const val = document.getElementById('new-class-input').value.trim();
        if(!val) return alert("請輸入新分類名稱");
        if(classList.includes(val)) return alert("此分類已存在");
        classList.push(val);
        localStorage.setItem('ml_classes_tags', JSON.stringify(classList));
        closeCustomClassModal();
        refreshClassElements();
        alert(`全新分類【${val}】建立成功！`);
    }

    function refreshClassElements() {
        // 1. 鋪設分類按鈕
        const zone = document.getElementById('class-buttons-zone');
        zone.innerHTML = "";
        classList.forEach(cls => {
            zone.innerHTML += `<button class="class-btn" id="f-tag-${cls}" onclick="filterByClass('${cls}')">${cls}</button>`;
        });
        // 2. 鋪設手動新增下拉選單
        const select = document.getElementById('c-class');
        select.innerHTML = "";
        classList.forEach(cls => { select.innerHTML += `<option value="${cls}">${cls}</option>`; });
        // 3. 鋪設編輯下拉選單
        const editSelect = document.getElementById('edit-class');
        editSelect.innerHTML = "";
        classList.forEach(cls => { editSelect.innerHTML += `<option value="${cls}">${cls}</option>`; });
    }

    function filterByClass(className) {
        currentClassFilter = className;
        document.querySelectorAll('.class-btn').forEach(b => b.classList.remove('active'));
        const el = document.getElementById(`f-tag-${className}`);
        if(el) el.classList.add('active');

        document.getElementById('tree-title-text').innerText = `📊 第二層：【${className}】人脈樹鏈`;
        document.getElementById('tree-back-indicator').style.display = "inline";

        const canvas = document.getElementById('master-tree-canvas'); canvas.innerHTML = "";
        const classCenterNode = document.createElement('div');
        classCenterNode.style.cssText = "position:absolute; top:100px; left:145px; width:90px; padding:8px; background:var(--navy-premium); color:white; border-radius:12px; font-size:12px; font-weight:bold; text-align:center; z-index:10; border:1px solid var(--premium-gold);";
        classCenterNode.innerText = `🌿 ${className}`; canvas.appendChild(classCenterNode);

        const classClients = clients.filter(c => c.clientClass === className);
        if(classClients.length === 0) {
            canvas.innerHTML += `<div style="font-size:12px; color:gray; text-align:center; margin-top:60px; width:100%;">此標籤下目前無樹狀網絡。</div>`;
            renderClients(clients); return;
        }

        const clientPositions = [[15, 30], [270, 30], [15, 160], [270, 160]];
        classClients.forEach((c, cIdx) => {
            if(cIdx >= clientPositions.length) return; const cPos = clientPositions[cIdx];
            const cNode = document.createElement('div');
            cNode.style.cssText = `position:absolute; left:${cPos[0]}px; top:${cPos[1]}px; width:90px; padding:5px; background:#fffdf7; border:1.5px solid var(--wine-red); border-radius:8px; font-size:11.5px; font-weight:bold; text-align:center; z-index:6;`;
            cNode.innerText = `👤 ${c.name}`; canvas.appendChild(cNode);
            drawCanvasLine(canvas, 190, 120, cPos[0]+45, cPos[1]+15);

            if(c.family) {
                const members = c.family.split(/[,，]/);
                members.forEach((m, mIdx) => {
                    if(mIdx > 1) return;
                    const offsetX = cPos[0] < 150 ? -10 : 100; const offsetY = mIdx === 0 ? -12 : 24;
                    const mNode = document.createElement('div');
                    mNode.style.cssText = `position:absolute; left:${cPos[0] + offsetX}px; top:${cPos[1] + offsetY}px; width:60px; padding:2px; background:#f8fafc; border:1px solid var(--text-sub); border-radius:4px; font-size:9.5px; text-align:center; z-index:4; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;`;
                    mNode.innerText = m.trim(); canvas.appendChild(mNode);
                    drawCanvasLine(canvas, cPos[0]+45, cPos[1]+15, cPos[0]+offsetX+30, cPos[1]+offsetY+8);
                });
            }
        });
        renderClients(clients);
    }

    function drawFirstLevelTree() {
        currentClassFilter = '';
        document.getElementById('tree-title-text').innerText = "📊 第一層：全脈絡人脈類別樹";
        document.getElementById('tree-back-indicator').style.display = "none";
        document.querySelectorAll('.class-btn').forEach(b => b.classList.remove('active'));
        const canvas = document.getElementById('master-tree-canvas'); canvas.innerHTML = "";

        const meNode = document.createElement('div');
        meNode.style.cssText = "position:absolute; top:100px; left:145px; width:90px; padding:8px; background:var(--wine-red); color:white; border-radius:50%; font-size:12px; font-weight:bold; text-align:center; z-index:10; box-shadow:0 4px 10px rgba(0,0,0,0.15);";
        meNode.innerText = "👑 " + (document.getElementById('login-name').value || "大壯"); canvas.appendChild(meNode);

        const positions = [[20, 25], [145, 12], [270, 25], [20, 175], [145, 185], [270, 175]];
        classList.forEach((cls, idx) => {
            if(idx >= positions.length) return; // 手機版布陣上限顯示6個
            const pos = positions[idx]; const count = clients.filter(c => c.clientClass === cls).length;
            const btnNode = document.createElement('div');
            btnNode.style.cssText = `position:absolute; left:${pos[0]}px; top:${pos[1]}px; width:88px; padding:5px 1px; background:#fff; border:1.5px solid var(--premium-gold); border-radius:10px; font-size:11px; font-weight:bold; text-align:center; cursor:pointer; z-index:5;`;
            btnNode.innerHTML = `🌿 ${cls}<br><span style="color:var(--text-sub); font-size:9.5px;">(${count}佈局)</span>`;
            btnNode.onclick = () => filterByClass(cls); canvas.appendChild(btnNode);
            drawCanvasLine(canvas, 190, 120, pos[0]+44, pos[1]+15);
        });
    }

    function resetToFirstLevelTree() { drawFirstLevelTree(); renderClients(clients); }
    function drawCanvasLine(canvas, sX, sY, eX, eY) { const line = document.createElement('div'); line.style.cssText = `position:absolute; background:#ebdcd8; height:1px; z-index:1; transform-origin: top left;`; const dist = Math.sqrt((eX - sX) ** 2 + (eY - sY) ** 2); const angle = Math.atan2(eY - sY, eX - sX) * 180 / Math.PI; line.style.width = dist + "px"; line.style.left = sX + "px"; line.style.top = sY + "px"; line.style.transform = `rotate(${angle}deg)`; canvas.appendChild(line); }

    // 💡 修正 4：傻瓜式一個一個輸入關係人小積木
    function addSingleFamilyChip() {
        const name = document.getElementById('temp-f-name').value.trim();
        const rel = document.getElementById('temp-f-rel').value.trim();
        if(!name || !rel) return alert("請填齊家人姓名與關係");
        
        tempFamilyChips.push(`${name}-${rel}`);
        renderFamilyChipsPool();
        
        document.getElementById('temp-f-name').value = "";
        document.getElementById('temp-f-rel').value = "";
    }
    function renderFamilyChipsPool() {
        const pool = document.getElementById('family-chips-pool');
        pool.innerHTML = "";
        tempFamilyChips.forEach((chip, i) => {
            pool.innerHTML += `<span class="member-chip">👥 ${chip} <span style="color:red;font-weight:bold;margin-left:4px;" onclick="removeFamilyChip(${i})">✕</span></span>`;
        });
    }
    function removeFamilyChip(i) { tempFamilyChips.splice(i, 1); renderFamilyChipsPool(); }

    function searchClients() {
        const keyword = document.getElementById('search-input').value.toLowerCase().trim();
        if(!keyword) { renderClients(clients); return; }
        const filtered = clients.filter(c => c.name.toLowerCase().includes(keyword) || (c.phone && c.phone.includes(keyword)) || (c.finance && c.finance.toLowerCase().includes(keyword)));
        renderClients(filtered, true);
    }

    function renderClients(dataSource, isSearching = false) {
        const list = document.getElementById('client-list-container'); list.innerHTML = "";
        if(!isSearching && !currentClassFilter) { list.innerHTML = `<div style="text-align:center; color:gray; font-size:12px; margin-top:10px;">💡 請先點擊上方標籤按鈕。</div>`; return; }
        
        const displayData = isSearching ? dataSource : dataSource.filter(c => c.clientClass === currentClassFilter);
        displayData.forEach((c) => {
            const globalIndex = clients.indexOf(c);
            let intelHtml = ""; const dimensions = ["背景地雷", "家系人脈", "財務資產", "決策主導", "競爭防線"];
            let missingIntel = [];
            c.intel.forEach((hasIt, idx) => {
                intelHtml += `<span class="intel-badge ${hasIt?'intel-yes':'intel-no'}">${hasIt?'✓':'✗'} ${dimensions[idx]}</span>`;
                if(!hasIt) missingIntel.push(dimensions[idx]);
            });

            let historyHtml = "";
            if(c.visits) c.visits.forEach(v => historyHtml += `<div class="history-item"><span class="history-date">📅 ${v.date}</span>${v.detail}</div>`);

            list.innerHTML += `
                <div class="client-item">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;">
                        <span style="font-size:15px; font-weight:bold; color:var(--navy-premium);">${c.name}</span>
                        <div style="display:flex; gap:4px;">
                            <button class="nav-btn" style="padding:4px 8px; font-size:11px; margin:0;" onclick="openEditModal(${globalIndex})">✏️ 編輯</button>
                            <button class="nav-btn" style="padding:4px 8px; font-size:11px; margin:0;" onclick="openGenogram(${globalIndex})">📊 家系</button>
                        </div>
                    </div>
                    <div class="info-row"><span class="info-label">📞 電話：</span>${c.phone || '未掌握'} | <span class="info-label">📍 地址：</span>${c.address || '未掌握'}</div>
                    <div style="margin:4px 0;">${intelHtml}</div>
                    <div class="biz-premium-box">
                        <div class="biz-title">💰 財務狀況：</div><div>${c.finance || '⚠️ 未掌握'}</div>
                        <div class="biz-title">⚖️ 決策核心：</div><div>${c.decision || '⚠️ 未掌握'}</div>
                        <div class="biz-title">⚔️ 同行競爭：</div><div>${c.competitor || '⚠️ 未掌握'}</div>
                    </div>
                    <div class="history-box"><div class="history-title">📈 歷史對談歷程</div>${historyHtml || '暫無紀錄'}</div>
                    <button class="btn" style="background:#f1f5f9; color:#ef4444; padding:2px; font-size:11px; margin-top:8px; width:auto; height:28px;" onclick="deleteClient(${globalIndex})">移除客戶</button>
                </div>
            `;
        });
        localStorage.setItem('ml_clients', JSON.stringify(clients));
    }

    function addClient() {
        const name = document.getElementById('c-name').value.trim(); const cls = document.getElementById('c-class').value; if(!name) return alert("請輸入客戶姓名");
        let intelArray = [document.getElementById('i-1').checked, document.getElementById('i-2').checked, document.getElementById('i-3').checked, document.getElementById('i-4').checked, document.getElementById('i-5').checked];
        let historyArray = []; const fv = document.getElementById('c-first-visit').value.trim();
        if(fv) historyArray.push({ date: new Date().toISOString().split('T')[0], detail: fv });

        // 將積木池串起來
        const familyString = tempFamilyChips.join(", ");

        clients.push({
            name, phone: document.getElementById('c-phone').value, address: document.getElementById('c-address').value, family: familyString, clientClass: cls, finance: document.getElementById('c-finance').value, decision: document.getElementById('c-decision').value, competitor: document.getElementById('c-competitor').value, intel: intelArray, visits: historyArray
        });
        
        tempFamilyChips = []; renderFamilyChipsPool();
        document.getElementById('c-name').value = ""; document.getElementById('c-phone').value = ""; document.getElementById('c-address').value = ""; document.getElementById('c-first-visit').value = "";
        filterByClass(cls);
    }

    function openEditModal(globalIndex) {
        const c = clients[globalIndex]; document.getElementById('edit-index').value = globalIndex; document.getElementById('edit-name').value = c.name; document.getElementById('edit-phone').value = c.phone || ""; document.getElementById('edit-address').value = c.address || ""; document.getElementById('edit-family').value = c.family || ""; document.getElementById('edit-class').value = c.clientClass; document.getElementById('edit-finance').value = c.finance || ""; document.getElementById('edit-decision').value = c.decision || ""; document.getElementById('edit-competitor').value = c.competitor || ""; document.getElementById('edit-new-visit').value = "";
        for(let i=1; i<=5; i++) document.getElementById(`e-i-${i}`).checked = c.intel ? c.intel[i-1] : false;
        document.getElementById('edit-modal').style.display = "flex";
    }
    function closeEditModal() { document.getElementById('edit-modal').style.display = "none"; }
    function saveClientEdit() {
        const idx = document.getElementById('edit-index').value; const targetClass = document.getElementById('edit-class').value; const nv = document.getElementById('edit-new-visit').value.trim();
        if(nv) { if(!clients[idx].visits) clients[idx].visits = []; clients[idx].visits.push({ date: new Date().toISOString().split('T')[0], detail: nv }); }
        let intelArray = []; for(let i=1; i<=5; i++) intelArray.push(document.getElementById(`e-i-${i}`).checked);
        clients[idx].name = document.getElementById('edit-name').value; clients[idx].phone = document.getElementById('edit-phone').value; clients[idx].address = document.getElementById('edit-address').value; clients[idx].family = document.getElementById('edit-family').value; clients[idx].clientClass = targetClass; clients[idx].finance = document.getElementById('edit-finance').value; clients[idx].decision = document.getElementById('edit-decision').value; clients[idx].competitor = document.getElementById('edit-competitor').value; clients[idx].intel = intelArray;
        closeEditModal(); alert("資產特質情報變更修改成功！"); filterByClass(targetClass);
    }

    // 💡 修正 5：即時聯結雲端大腦 (內建完全體金鑰)
    async function callGeminiLive() {
        const out = document.getElementById('topic-output'); const btn = document.getElementById('ai-gen-btn');
        out.innerText = "🔮 胡曼黎大腦正在即時連線雲端，孵化專屬破冰文案，請稍候..."; btn.disabled = true;
        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${SECRET_KEY}`, {
                method: "POST", headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: `妳是保險銷售天后胡曼黎。請針對當前時空背景（當前時序為2026年）的【${currentTopicPrompt}】即時生成一則120字內的溫暖問候破冰文案，自然切入、幽默優雅，並強烈引導客戶與妳約時間重新進行保單檢視或資產配置。直接吐出內容，多加精美Emoji。` }] }] })
            });
            const d = await res.json(); out.innerText = d.candidates[0].content.parts[0].text.trim();
        } catch (e) { out.innerText = "⚠️ 即時連線大腦出錯，請確認網路現狀後點選重新生成。"; } finally { btn.disabled = false; }
    }
    function changeTopic(p, btn) { document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); currentTopicPrompt = p; callGeminiLive(); }
    function copyTopic() { navigator.clipboard.writeText(document.getElementById('topic-output').innerText); alert('文案複製成功！🚀'); }

    function renderCalendar() { const grid = document.getElementById('calendar-box'); grid.innerHTML = ""; for(let d=1; d<=31; d++) { const dateStr = `2026-07-${d.toString().padStart(2, '0')}`; grid.innerHTML += `<div class="calendar-day" onclick="showDayDetail('${dateStr}')">${d}</div>`; } }
    function showDayDetail(dateStr) { const box = document.getElementById('calendar-detail-box'); box.innerHTML = `<b>📅 ${dateStr} 行事曆</b><br>功能完備，隨時可於上方追加。`; }
    function addSchedule() { alert("行程排定成功！"); }
    function deleteClient(index) { clients.splice(index, 1); filterByClass(currentClassFilter); }
    function openGenogram(gIdx) { const c = clients[gIdx]; document.getElementById('geno-title').innerText = `${c.name} 家族核心`; const b = document.getElementById('geno-body'); b.innerHTML = `👑 ${c.name}<br>│<br>`; if(c.family) c.family.split(/[,，]/).forEach(m => b.innerHTML += `<span style="border:1px solid #ccc; padding:4px; margin:2px; display:inline-block; font-size:11px; border-radius:4px;">${m.trim()}</span>`); document.getElementById('geno-modal').style.display = "flex"; }
    function closeGenoModal() { document.getElementById('geno-modal').style.display = "none"; }
    window.onload = function() { document.getElementById('login-screen').style.display = "block"; }
</script>
</body>
