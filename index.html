<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>胡曼黎全能手冊 — 完全體</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #1a1515 0%, #2c1e1e 100%);
            --card-bg: rgba(255, 255, 255, 0.98);
            --gold: #d4af37;
            --gold-dark: #aa8416;
            --wine-red: #722f37;
            --text-main: #2c2523;
            --text-sub: #786e6c;
            --border: #e8e8e8;
            --temp-hot: #ff4d4f;
            --temp-warm: #faad14;
            --temp-cold: #1890ff;
        }

        body {
            font-family: 'PingFang TC', 'Noto Sans TC', sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .container {
            width: 100%;
            max-width: 480px;
            background: var(--card-bg);
            border-radius: 32px;
            padding: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            box-sizing: border-box;
        }

        header {
            text-align: center;
            margin-bottom: 24px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 16px;
        }

        h1 {
            font-size: 24px;
            margin: 0;
            color: var(--text-main);
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 11px;
            color: var(--gold-dark);
            letter-spacing: 3px;
            margin-top: 6px;
        }

        .section {
            background: #fcfcfd;
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
        }

        .section-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--wine-red);
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* 模組 4：每日能量與底氣 */
        .gold-quote {
            font-size: 13.5px;
            line-height: 1.6;
            color: var(--text-main);
            border-left: 3px solid var(--gold);
            padding-left: 12px;
            margin: 8px 0;
            font-style: italic;
        }

        .badge {
            background: #f4ebe8;
            color: var(--wine-red);
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 600;
        }

        /* 模組 1 & 2：人情簿與溫度計 */
        .client-item {
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 10px;
            background: white;
        }

        .client-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .client-name {
            font-weight: 600;
            font-size: 15px;
        }

        .temp-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
        }

        .tree-view {
            background: #f9f9fb;
            padding: 8px;
            border-radius: 8px;
            font-size: 12px;
            color: var(--text-sub);
            margin-bottom: 8px;
            border-left: 2px solid var(--border);
        }

        .memo-text {
            font-size: 12.5px;
            color: var(--text-main);
            background: #fffdf9;
            padding: 6px;
            border-radius: 6px;
            border: 1px dashed #ebdcd8;
        }

        /* 表單輸入 */
        input, textarea, select {
            width: 100%;
            padding: 8px;
            margin-bottom: 8px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 13px;
        }

        .btn {
            background: var(--wine-red);
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            transition: 0.3s;
        }

        .btn:hover { background: #552228; }

        .btn-gold {
            background: linear-gradient(135deg, #d4af37 0%, #aa8416 100%);
        }

        /* 模組 3：破冰話題 */
        .tag-container {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 12px;
        }

        .tag-btn {
            background: #f0f0f0;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 6px 10px;
            font-size: 11px;
            cursor: pointer;
        }

        .tag-btn.active {
            background: var(--wine-red);
            color: white;
            border-color: var(--wine-red);
        }

        .output-box {
            background: #f7f7f9;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
            font-size: 13px;
            position: relative;
        }

        /* 模組 5：日程規劃 */
        .schedule-list {
            font-size: 13px;
        }
        .schedule-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px dashed var(--border);
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>胡曼黎 全能手冊</h1>
        <div class="subtitle">金牌實戰 · 掌控全局</div>
    </header>

    <!-- 4. 每日能量與底氣 -->
    <div class="section">
        <div class="section-title">🛡️ 拜訪前的心理防護罩 <button class="btn" style="padding:2px 6px; font-size:10px;" onclick="refreshEnergy()">刷新</button></div>
        <div>🧭 幸運方位：<span class="badge" id="compass-text">正東方（貴人相助）</span></div>
        <div class="gold-quote" id="quote-text">「女性最大的保險，是經營好自己。今天不開單，明天吃路邊攤。打起精神出門！」</div>
    </div>

    <!-- 3. 破冰話題產生器 -->
    <div class="section">
        <div class="section-title">🚀 破冰話題產生器</div>
        <div class="tag-container">
            <button class="tag-btn active" onclick="changeTopic('news', this)">🔥 熱門新聞</button>
            <button class="tag-btn" onclick="changeTopic('weather', this)">☀️ 當日天氣</button>
            <button class="tag-btn" onclick="changeTopic('insurance', this)">💼 保險議題</button>
            <button class="tag-btn" onclick="changeTopic('cancer', this)">🩺 癌症資訊</button>
            <button class="tag-btn" onclick="changeTopic('finance', this)">📈 財經熱門</button>
        </div>
        <div class="output-box">
            <div id="topic-output" style="margin-bottom: 30px;">載入中...</div>
            <button class="btn btn-gold" style="position:absolute; bottom:8px; right:8px; font-size:10px;" onclick="copyTopic()">複製</button>
        </div>
    </div>

    <!-- 1 & 2. 老上海人情簿 & 溫度計 -->
    <div class="section">
        <div class="section-title">👥 老上海人情簿 (互動 CRM)</div>
        
        <!-- 新增客戶表單 -->
        <div style="background: #f0f0f2; padding: 10px; border-radius: 12px; margin-bottom: 12px;">
            <b style="font-size:12px;">新增曼黎的重要客戶：</b>
            <input type="text" id="c-name" placeholder="客戶姓名">
            <input type="text" id="c-family" placeholder="家族關係譜 (例: 夫:張明 / 子:張小寶)">
            <select id="c-days">
                <option value="3">7天內聯絡過 (滾燙紅)</option>
                <option value="15">14天內聯絡過 (溫暖黃)</option>
                <option value="40">超過30天沒聯絡 (冰藍冷)</option>
            </select>
            <textarea id="c-memo" placeholder="曼黎碎碎念：客戶地雷、重要日子與細項事項"></textarea>
            <button class="btn" style="width:100%" onclick="addClient()">存入人情簿</button>
        </div>

        <!-- 客戶列表展示 -->
        <div id="client-list"></div>
    </div>

    <!-- 5. 訪量日程規劃（下兩週） -->
    <div class="section">
        <div class="section-title">📅 下兩週訪量行程確認</div>
        <div style="background: #f0f0f2; padding: 10px; border-radius: 12px; margin-bottom: 12px;">
            <input type="date" id="s-date">
            <input type="text" id="s-event" placeholder="拜訪客戶與行程目的">
            <button class="btn" style="width:100%" onclick="addSchedule()">排定行程</button>
        </div>
        <div class="schedule-list" id="schedule-list"></div>
    </div>
</div>

<script>
    // 預設資料庫（若本機沒資料則啟用）
    let clients = JSON.parse(localStorage.getItem('ml_clients')) || [
        {name: "陳大姐", family: "👵 獨居 / 姪子每週探望", days: 4, memo: "⚡️ 地雷：不喜歡別人聊到政治。🎂 重要日子：10/12 生日。喜歡吃軟一點的糕點。"},
        {name: "林先生", family: "👨 妻:林太太 / 女:2歲", days: 20, memo: "⚡️ 地雷：討厭推銷感太重。最近在煩惱女兒幼兒園抽籤。"}
    ];

    let schedules = JSON.parse(localStorage.getItem('ml_schedules')) || [
        {date: "2026-07-01", event: "與陳大姐喝下午茶（送糕點破冰）"},
        {date: "2026-07-06", event: "拜訪林先生（做新一季保單檢視）"}
    ];

    const quotes = [
        "「女性最大的保險，是經營好自己。今天不開單，明天吃路邊攤。打起精神出門！」",
        "「客戶拒絕妳不是討厭妳，是討厭不夠專業的妳。今天給我把專業拿出來，出陣！」",
        "「人情世故就是妳的財富。把客戶當家人照顧，業績自然會開花結果！」",
        "「與其等待機會，不如自己去敲門。曼黎字典裡，從來沒有放棄這兩個字！」"
    ];
    const compasses = ["正東方（貴人相助）", "正南方（簽約大吉）", "西北方（破冰順利）", "東北方（財運亨通）"];

    const topics = {
        news: "最近看新聞發現高通膨時代大家都在討論怎麼抗通膨，突然想到妳，最近工作還順利嗎？找時間一起喝杯咖啡，跟妳分享幾個實用的理財防禦小撇步呀！☕️",
        weather: "哈囉！今天天氣突然變得很悶熱，出門記得多喝水喔！最近剛好是新一季保單檢視的季節，出門在外注意安全的同時，也別忘了關心一下自己的保障喔～安全第一！❤️",
        insurance: "姐！最近很多客戶都在問醫療險改革的事情，大家都卡在額度不夠用。我剛好幫妳的保障做了一張視覺對比圖，看這週四或週五哪天方便，我過去幫妳分析一下！📊",
        cancer: "妳知道嗎？最近健保新藥的新聞炒得很熱，很多新型癌症標靶藥物動輒上百萬，真的讓人很有感。其實提早規劃好防癌與重大傷病，就是對家人最負責任的愛。最近有空讓我幫妳看看目前的規劃有沒有漏洞嗎？❤️",
        finance: "最近美股和台股波動真的蠻大的，很多人都在聊資產配置。其實在這種市場下，有一筆穩定增值、不受市場影響的配置才是最安心的底氣。這幾天找時間聊聊吧！📈"
    };

    // 初始化渲染
    function init() {
        renderClients();
        renderSchedules();
        changeTopic('news', document.querySelector('.tag-btn'));
        refreshEnergy();
    }

    // 4. 刷新金句與方位
    function refreshEnergy() {
        document.getElementById('quote-text').innerText = quotes[Math.floor(Math.random() * quotes.length)];
        document.getElementById('compass-text').innerText = compasses[Math.floor(Math.random() * compasses.length)];
    }

    // 3. 破冰話題切換
    function changeTopic(type, btn) {
        document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('topic-output').innerText = topics[type];
    }
    function copyTopic() {
        navigator.clipboard.writeText(document.getElementById('topic-output').innerText);
        alert('曼黎提示：破冰話題複製成功！');
    }

    // 1 & 2. 人情簿與溫度計渲染
    function renderClients() {
        const list = document.getElementById('client-list');
        list.innerHTML = "";
        clients.forEach((c, index) => {
            let color = var(--temp-hot);
            let statusText = "滾燙紅 (近日常聯絡)";
            if(c.days > 14 && c.days <= 30) { color = var(--temp-warm); statusText = "溫暖黃 (該傳訊問候)"; }
            else if(c.days > 30) { color = var(--temp-cold); statusText = "冰藍冷 (斷聯警戒！)"; }

            list.innerHTML += `
                <div class="client-item">
                    <div class="client-header">
                        <span class="client-name"><span class="temp-dot" style="background:${color}"></span>${c.name}</span>
                        <span style="font-size:11px; color:${color}; font-weight:600;">${statusText}</span>
                    </div>
                    <div class="tree-view">🌳 家族譜：${c.family || '暫無設定'}</div>
                    <div class="memo-text">💬 <b>曼黎碎碎念備忘：</b><br>${c.memo}</div>
                    <button class="btn" style="background:#ddd; color:#333; margin-top:8px; padding:2px 6px; font-size:10px;" onclick="deleteClient(${index})">刪除</button>
                </div>
            `;
        });
        localStorage.setItem('ml_clients', JSON.stringify(clients));
    }

    function addClient() {
        const name = document.getElementById('c-name').value;
        const family = document.getElementById('c-family').value;
        const days = parseInt(document.getElementById('c-days').value);
        const memo = document.getElementById('c-memo').value;
        if(!name) return alert("請輸入客戶姓名");
        clients.push({name, family, days, memo});
        renderClients();
        // 清空表單
        document.getElementById('c-name').value = "";
        document.getElementById('c-family').value = "";
        document.getElementById('c-memo').value = "";
    }

    function deleteClient(index) {
        clients.splice(index, 1);
        renderClients();
    }

    // 5. 日程規劃渲染
    function renderSchedules() {
        const list = document.getElementById('schedule-list');
        list.innerHTML = "";
        // 排序行程
        schedules.sort((a,b) => new Date(a.date) - new Date(b.date));
        schedules.forEach((s, index) => {
            list.innerHTML += `
                <div class="schedule-item">
                    <span>📅 <b>${s.date}</b> — ${s.event}</span>
                    <span style="color:red; cursor:pointer;" onclick="deleteSchedule(${index})">❌</span>
                </div>
            `;
        });
        localStorage.setItem('ml_schedules', JSON.stringify(schedules));
    }

    function addSchedule() {
        const date = document.getElementById('s-date').value;
        const event = document.getElementById('s-event').value;
        if(!date || !event) return alert("請填妥日期與行程內容");
        schedules.push({date, event});
        renderSchedules();
        document.getElementById('s-event').value = "";
    }

    function deleteSchedule(index) {
        schedules.splice(index, 1);
        renderSchedules();
    }

    window.onload = init;
</script>

</body>
</html>
