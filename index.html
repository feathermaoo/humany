<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>胡曼黎全能手冊 — 終極完全體</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #11141a 0%, #1c222d 100%);
            --card-bg: rgba(255, 255, 255, 0.98);
            --platinum-gold: #c5a880;
            --platinum-dark: #8c7355;
            --navy-premium: #0f1e36;
            --text-main: #1e2530;
            --text-sub: #657185;
            --border: #e2e8f0;
            --wine-red: #722f37;
            --intel-yes-bg: #dcfce7;
            --intel-yes-text: #166534;
            --intel-no-bg: #fee2e2;
            --intel-no-text: #991b1b;
        }

        body { font-family: 'PingFang TC', 'Noto Sans TC', sans-serif; background: var(--bg-gradient); min-height: 100vh; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: flex-start; }
        .container { width: 100%; max-width: 480px; background: var(--card-bg); border-radius: 24px; padding: 24px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); box-sizing: border-box; position: relative; }
        
        .home-btn { position: absolute; top: 20px; left: 24px; background: none; border: 1px solid var(--border); padding: 6px 12px; border-radius: 8px; font-size: 11px; font-weight: 600; color: var(--text-sub); cursor: pointer; z-index: 100; }

        #login-screen { text-align: center; padding: 40px 10px; }
        .login-logo { font-size: 26px; font-weight: 700; color: var(--navy-premium); letter-spacing: 4px; margin-bottom: 8px; margin-top: 20px; }
        .login-line { width: 40px; height: 3px; background: var(--platinum-gold); margin: 15px auto; }
        #main-system { display: none; }

        .user-top-memo { background: #f8fafc; border-left: 4px solid var(--platinum-gold); padding: 12px 16px; border-radius: 0 12px 12px 0; font-size: 13px; line-height: 1.6; margin-bottom: 20px; color: var(--text-main); margin-top: 15px; }
        .nav-menu { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 20px; }
        .nav-btn { background: #fff; border: 1px solid var(--border); padding: 12px 4px; font-size: 12px; font-weight: 600; color: var(--navy-premium); border-radius: 12px; cursor: pointer; text-align: center; }
        .nav-btn.active { background: var(--navy-premium); color: white; border-color: var(--navy-premium); }
        .app-panel { display: none; }
        .app-panel.active { display: block; }

        .class-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 16px; }
        .class-btn { padding: 8px 4px; font-size: 12px; font-weight: bold; border: 1px solid var(--border); border-radius: 10px; cursor: pointer; background: white; color: var(--navy-premium); }
        .class-btn.active { background: var(--platinum-dark); color: white; border-color: transparent; }

        .tree-canvas-header { font-size: 12.5px; font-weight: bold; color: var(--platinum-dark); margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; }
        .tree-canvas-box { width: 100%; height: 260px; border: 1px solid var(--platinum-gold); background: #fffdfb; border-radius: 16px; position: relative; overflow: hidden; margin-bottom: 16px; }

        input, textarea, select { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid var(--border); border-radius: 8px; box-sizing: border-box; font-size: 13px; }
        .btn { background: var(--navy-premium); color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; width: 100%; text-align: center; }
        .btn-gold { background: linear-gradient(135deg, #c5a880 0%, #8c7355 100%); }
        
        .client-item { background: white; border: 1px solid var(--border); border-radius: 12px; padding: 14px; margin-bottom: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .info-row { font-size: 12px; color: var(--text-sub); margin-bottom: 4px; }
        .info-label { font-weight: bold; color: var(--text-main); }
        
        .intel-badge { display: inline-block; padding: 2px 6px; font-size: 11px; border-radius: 4px; margin-right: 4px; margin-bottom: 4px; font-weight: bold; }
        .intel-yes { background: var(--intel-yes-bg); color: var(--intel-yes-text); }
        .intel-no { background: var(--intel-no-bg); color: var(--intel-no-text); border: 1px dashed #ef4444; }
        
        .biz-premium-box { background: #f8fafc; border: 1px solid var(--border); padding: 10px; border-radius: 8px; margin-top: 8px; font-size: 12px; }
        .biz-title { font-weight: bold; color: var(--navy-premium); margin-bottom: 2px; margin-top: 4px; }

        .history-box { background: #fffdf9; border: 1px dashed #ebdcd8; padding: 10px; border-radius: 8px; margin-top: 8px; }
        .history-title { font-size: 12px; font-weight: bold; color: var(--platinum-dark); margin-bottom: 6px; border-bottom: 1px solid #f5ebe6; padding-bottom: 4px; }
        .history-item { font-size: 11.5px; line-height: 1.5; padding: 4px 0; border-bottom: 1px dotted #ebdcd8; color: var(--text-main); }
        .history-date { color: var(--platinum-dark); font-weight: bold; margin-right: 6px; }

        .tag-container { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
        .tag-btn { background: #f1f5f9; border: none; border-radius: 6px; padding: 6px 12px; font-size: 11px; cursor: pointer; }
        .tag-btn.active { background: var(--platinum-dark); color: white; }
        .output-box { background: #f8fafc; border: 1px solid var(--border); border-radius: 12px; padding: 14px; font-size: 13px; position: relative; }

        .excel-mapping-box { background: #fffbeb; border: 1px solid #fef3c7; padding: 12px; border-radius: 10px; margin-bottom: 12px; display: none; }
        .mapping-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; font-size: 12px; }
        .mapping-row select { width: 60%; margin-bottom: 0; padding: 4px; }

        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin-top: 10px; }
        .calendar-day { background: #f8fafc; border-radius: 8px; padding: 10px 0; font-size: 12px; text-align: center; cursor: pointer; }
        .calendar-day.has-event::after { content: ''; width: 6px; height: 6px; background: var(--platinum-gold); border-radius: 50%; display: block; margin: 4px auto 0 auto; }
        .calendar-day.active { background: var(--navy-premium); color: white; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); justify-content: center; align-items: center; z-index: 1000; padding: 20px; }
        .modal-content { background: white; padding: 20px; border-radius: 16px; width: 100%; max-width: 420px; max-height: 90vh; overflow-y: auto; }
    </style>
</head>
<body>

<div class="container">
    
    <button class="home-btn" id="global-home-btn" style="display:none;" onclick="logoutToHome()">↩ 返回首頁</button>

    <div id="login-screen">
        <div class="login-logo">胡曼黎全能手冊</div>
        <div style="font-size: 11px; color: var(--text-sub); letter-spacing: 2px;">EXECUTIVE WORKBENCH</div>
        <div class="login-line"></div>
        <input type="text" id="login-name" placeholder="請輸入業務員姓名" value="羽毛">
        <input type="date" id="login-birthday" value="1984-06-13">
        <button class="btn btn-gold" onclick="handleLogin()">身分驗證 · 進入主系統</button>
    </div>

    <div id="main-system">
        <header style="text-align: center; margin-bottom: 16px; margin-top: 15px;">
            <h1 style="font-size: 20px; color: var(--navy-premium); letter-spacing: 1px;">胡曼黎全能手冊</h1>
        </header>

        <div class="user-top-memo" id="top-memo-bar">載入專屬走向中...</div>

        <div class="nav-menu">
            <button class="nav-btn active" onclick="switchPanel('panel-crm', this)">👥 人情簿</button>
            <button class="nav-btn" onclick="switchPanel('panel-calendar', this)">📅 行事曆</button>
            <button class="nav-btn" onclick="switchPanel('panel-ice', this)">🚀 破冰話題</button>
        </div>

        <div id="panel-crm" class="app-panel active">
            
            <div style="margin-bottom: 12px;">
                <input type="text" id="search-input" placeholder="🔍 搜尋姓名/電話/地址/歷程/商戰情報..." oninput="searchClients()" style="margin-bottom:0; border-color: var(--platinum-gold);">
            </div>

            <div class="class-container">
                <button class="class-btn" id="f-colleague" onclick="filterByClass('前同事')">前同事</button>
                <button class="class-btn" id="f-classmate" onclick="filterByClass('同學')">同學</button>
                <button class="class-btn" id="f-relative" onclick="filterByClass('親戚')">親戚</button>
                <button class="class-btn" id="f-stranger" onclick="filterByClass('陌開')">陌開</button>
                <button class="class-btn" id="f-referral" onclick="filterByClass('轉介')">轉介</button>
                <button class="class-btn" id="f-other" onclick="filterByClass('其他')">其他</button>
            </div>

            <div class="tree-canvas-header">
                <span id="tree-title-text">📊 第一層：全脈絡人脈類別樹</span>
                <span id="tree-back-indicator" style="color:var(--wine-red); font-size:11px; cursor:pointer; display:none; font-weight:bold;" onclick="resetToFirstLevelTree()">↩ 返回類別樹</span>
            </div>
            <div class="tree-canvas-box" id="master-tree-canvas"></div>

            <div style="background: #f0fdf4; border: 1px solid #bbf7d0; padding: 12px; border-radius: 12px; margin-bottom: 12px; font-size: 12px;">
                <b style="color: #166534; display:block; margin-bottom:4px;">📈 老業務 Excel / CSV 智慧快速匯入：</b>
                <input type="file" id="excel-file" accept=".xlsx, .xls, .csv" style="font-size:12px; margin-bottom:6px;" onchange="handleExcelSelect(event)">
                
                <div class="excel-mapping-box" id="mapping-box">
                    <span style="font-weight:bold; color:#b45309; display:block; margin-bottom:6px; font-size:11px;">請自訂配對 Excel 欄位：</span>
                    <div class="mapping-row"><span>客戶姓名：</span><select id="map-name"></select></div>
                    <div class="mapping-row"><span>聯絡電話：</span><select id="map-phone"></select></div>
                    <div class="mapping-row"><span>通訊地址：</span><select id="map-address"></select></div>
                    <div class="mapping-row"><span>家系譜關係：</span><select id="map-family"></select></div>
                    <div class="mapping-row"><span>訪談紀錄備忘：</span><select id="map-memo"></select></div>
                    <button class="btn btn-gold" style="padding:4px; font-size:12px; margin-top:8px;" onclick="confirmExcelImport()">確認配對並吸入資料</button>
                </div>
            </div>

            <div style="background: #fff; border: 1px solid var(--border); padding: 12px; border-radius: 12px; margin-bottom: 16px;">
                <b style="font-size:12px; color:var(--wine-red); display:block; margin-bottom:6px;">👥 手動新增客戶佈局：</b>
                <input type="text" id="c-name" placeholder="客戶姓名*">
                <input type="text" id="c-phone" placeholder="聯絡電話 (3. 擴充欄位)">
                <input type="text" id="c-address" placeholder="通訊地址 (3. 擴充欄位)">
                <input type="text" id="c-family" placeholder="家系關係連線 (格式: 姓名-關係, 例: 小翠-太太, 小明-兒子)">
                <select id="c-class">
                    <option value="前同事">前同事</option><option value="同學">同學</option><option value="親戚">親戚</option><option value="陌開">陌開</option><option value="轉介">轉介</option><option value="其他">其他</option>
                </select>
                <input type="text" id="c-finance" placeholder="客戶財務狀況與資產規模">
                <input type="text" id="c-decision" placeholder="核心關鍵決策主導者">
                <input type="text" id="c-competitor" placeholder="同行潛在競爭防線">
                
                <b style="font-size:11px; color:var(--navy-premium); display:block; margin-bottom:4px;">🎯 情報力五向度現狀打勾：</b>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:4px; font-size:11px; margin-bottom:10px; background:#f8fafc; padding:6px; border-radius:6px;">
                    <label><input type="checkbox" id="i-1" style="width:auto; margin-bottom:0;"> 1.背景性格</label>
                    <label><input type="checkbox" id="i-2" style="width:auto; margin-bottom:0;"> 2.家系人脈</label>
                    <label><input type="checkbox" id="i-3" style="width:auto; margin-bottom:0;"> 3.財務資產</label>
                    <label><input type="checkbox" id="i-4" style="width:auto; margin-bottom:0;"> 4.決策歸屬</label>
                    <label><input type="checkbox" id="i-5" style="width:auto; margin-bottom:0;"> 5.競爭防線</label>
                </div>

                <textarea id="c-first-visit" placeholder="建立第一次訪談歷史紀錄歷程..." rows="2"></textarea>
                <button class="btn btn-gold" onclick="addClient()" style="padding:6px; font-size:12px;">布陣存入人情簿</button>
            </div>
            
            <div id="client-list-container"></div>
        </div>

        <div id="panel-calendar" class="app-panel">
            <div style="background: #fff; border: 1px solid var(--border); padding: 12px; border-radius: 12px; margin-bottom: 12px;">
                <input type="date" id="s-date" style="padding:6px; margin-bottom:6px;">
                <input type="text" id="s-event" placeholder="輸入行程目的 / 客戶對象" style="padding:6px; margin-bottom:6px;">
                <button class="btn" style="padding:6px; font-size:12px;" onclick="addSchedule()">排定行程</button>
            </div>
            <div style="font-size:13px; font-weight:bold; color:var(--navy-premium); text-align:center; margin-bottom:8px;">2026年 7月</div>
            <div class="calendar-grid" id="calendar-box"></div>
            <div id="calendar-detail-box" style="margin-top:12px; background:#f8fafc; padding:10px; border-radius:8px; font-size:12.5px; border:1px solid var(--border);">點擊日期格查看行程。</div>
        </div>

        <div id="panel-ice" class="app-panel">
            <div style="background: #fffbeb; border: 1px solid #fef3c7; padding: 10px; border-radius: 8px; margin-bottom: 12px; font-size: 11px;">
                🔑 <b>解鎖雲端聯結大腦：</b>
                <input type="password" id="gemini-key" placeholder="在此貼上妳的 Gemini API Key (系統會記在本機)" style="padding:5px; font-size:11px; margin-top:4px; margin-bottom:0;" onchange="saveApiKey()">
            </div>
            <div class="tag-container">
                <button class="tag-btn active" onclick="changeTopic('當前最熱門焦點新聞', this)">🔥 熱門新聞</button>
                <button class="tag-btn" onclick="changeTopic('今天最新的即時氣候變化與暖心關懷', this)">☀️ 當日天氣</button>
                <button class="tag-btn" onclick="changeTopic('目前的醫療險改革與實支實付等最新保險議題', this)">💼 保險議題</button>
                <button class="tag-btn" onclick="changeTopic('最新的癌症高額自費標靶藥物或健保新藥癌症新知', this)">🩺 癌症資訊</button>
                <button class="tag-btn" onclick="changeTopic('這兩天最熱門的台股、美股財經趨勢與高通膨配置', this)">📈 財經熱門</button>
            </div>
            <div class="output-box">
                <div id="topic-output" style="line-height: 1.6; min-height:80px; margin-bottom:40px; color: var(--text-main);">請先在上方貼上金鑰，再點選分類按鈕讓 AI 即時聯結生成...</div>
                <div style="position:absolute; bottom:8px; right:8px; display:flex; gap:6px;">
                    <button class="btn" id="ai-gen-btn" style="padding:4px 8px; font-size:11px; background:#0f1e36;" onclick="callGeminiLive()">⚡️ 連線 AI 即時生成</button>
                    <button class="btn btn-gold" style="padding:4px 8px; font-size:11px; width:auto;" onclick="copyTopic()">複製</button>
                </div>
            </div>
        </div>

    </div>
</div>

<div class="modal" id="geno-modal">
    <div class="modal-content" style="text-align: center;">
        <h3 style="margin-top:0; color:var(--navy-premium); font-size:15px;" id="geno-title">客戶家系圖</h3>
        <div style="border:1px solid var(--border); padding:15px; border-radius:8px; margin:15px 0; background:#f8fafc;" id="geno-body"></div>
        <button class="btn" style="background:#64748b; padding:6px; font-size:12px;" onclick="closeGenoModal()">關閉圖表</button>
    </div>
</div>

<div class="modal" id="edit-modal">
    <div class="modal-content">
        <h3 style="margin-top:0; color:var(--navy-premium); font-size:15px; border-bottom: 1px solid var(--border); padding-bottom: 8px;">✏️ 編輯客戶變更與訪談歷程</h3>
        <input type="hidden" id="edit-index">
        <label style="font-size:11px; font-weight:bold;">客戶姓名：</label><input type="text" id="edit-name">
        <label style="font-size:11px; font-weight:bold;">聯絡電話：</label><input type="text" id="edit-phone">
        <label style="font-size:11px; font-weight:bold;">通訊地址：</label><input type="text" id="edit-address">
        <label style="font-size:11px; font-weight:bold;">關係家系譜：</label><input type="text" id="edit-family">
        <label style="font-size:11px; font-weight:bold;">人脈標籤分類：</label>
        <select id="edit-class">
            <option value="前同事">前同事</option><option value="同學">同學</option><option value="親戚">親戚</option><option value="陌開">陌開</option><option value="轉介">轉介</option><option value="其他">其他</option>
        </select>
        <label style="font-size:11px; font-weight:bold;">財務狀況規模：</label><input type="text" id="edit-finance">
        <label style="font-size:11px; font-weight:bold;">關鍵核心決策者：</label><input type="text" id="edit-decision">
        <label style="font-size:11px; font-weight:bold;">同行競爭對手防線：</label><input type="text" id="edit-competitor">

        <label style="font-size:11px; font-weight:bold; color:var(--navy-premium);">🎯 情報力五向度重新確認：</label>
        <div style="font-size:11.5px; background:#f8fafc; padding:6px; border-radius:6px; margin-bottom:10px;">
            <label><input type="checkbox" id="e-i-1" style="width:auto;"> 1. 背景與地雷</label><br>
            <label><input type="checkbox" id="e-i-2" style="width:auto;"> 2. 家系人脈圖</label><br>
            <label><input type="checkbox" id="e-i-3" style="width:auto;"> 3. 財務與資產</label><br>
            <label><input type="checkbox" id="e-i-4" style="width:auto;"> 4. 決策主導權</label><br>
            <label><input type="checkbox" id="e-i-5" style="width:auto;"> 5. 競爭者威脅</label>
        </div>
        
        <label style="font-size:11px; font-weight:bold; color:var(--platinum-dark);">📈 追加新訪談紀錄歷程：</label>
        <textarea id="edit-new-visit" placeholder="輸入本次面談、簽單、定檢紀錄細項..." rows="2"></textarea>

        <div style="display:flex; gap:8px; margin-top:10px;"><button class="btn btn-gold" onclick="saveClientEdit()">儲存變更</button><button class="btn" style="background:#64748b;" onclick="closeEditModal()">取消</button></div>
    </div>
</div>

<script>
    const destinyDatabase = {
        1: "<b>[1號 領袖大腦備忘]</b> 適合開拓大型高資產件與法人單。⚠️ 注意：切忌推銷語氣過強，多聆聽需求。",
        2: "<b>[2號 軍師大腦備忘]</b> 適合走細膩的人情與轉介紹。⚠️ 注意：容易不好意思要求成交，請勇敢逼單。",
        3: "<b>[3號 行銷大腦備忘]</b> 適合故事化、感性社群破冰。⚠️ 注意：切勿全憑心情展業，需落實定檢日程。",
        4: "<b>[4號 架構大腦備忘]</b> 適合精準條款與家系圖規劃。⚠️ 注意：有時過於生硬，多展現溫塊人情。",
        5: "<b>[5號 開拓大腦備忘]</b> 陌生開發與變通直覺極強。⚠️ 注意：售後定檢切忌懶散，多追蹤歷程紀錄。",
        6: "<b>[6號 關懷大腦備忘]</b> 靠醫療長照溫情建立死忠客群。⚠️ 注意：不要將客戶的拒絕過度放大為內心受傷。",
        7: "<b>[7號 分析大腦備忘]</b> 以理財配置、稅務數據說服高管。⚠️ 注意：客戶往往基於『愛』簽單而非單純投報率。",
        8: "<b>[8號 企業大腦備忘]</b> 大格局思維，適合組織增員建團隊。⚠️ 注意：切忌給團隊太大壓力，多包容收服人心。",
        9: "<b>[9號 使命大腦備忘]</b> 將保險昇華為愛與責任的永續信賴。⚠️ 注意：容易因同情心怯於談錢，要勇敢Close。"
    };

    let currentTopicPrompt = '當前最熱門焦點新聞';
    let currentClassFilter = '';
    let excelRawData = [];

    // 完整預設資料庫：人脈、五向度、歷程、硬核商戰欄位全包
    let clients = JSON.parse(localStorage.getItem('ml_clients')) || [
        { name: "粘董", phone: "0912-888999", address: "彰化市大埔路", family: "小翠-太太, 粘小豪-長子", clientClass: "轉介", finance: "年營收5000萬傳產老闆", decision: "太太控財務章", competitor: "富邦舊單明年到期", intel: [true, true, true, true, false], visits: [{date: "2026-06-15", detail: "詢問新醫療险改革，送去資產比對圖。"}] },
        { name: "張經理", phone: "0933-111222", address: "台中市西屯區", family: "阿華-弟弟", clientClass: "前同事", finance: "科技業高管收入穩", decision: "本人決定", competitor: "無", intel: [true, true, false, true, true], visits: [{date: "2026-05-10", detail: "提過對儲蓄理財险有興趣。"}] }
    ];
    let schedules = JSON.parse(localStorage.getItem('ml_schedules')) || [
        {date: "2026-07-01", event: "與陳大姐簽要保書"},
        {date: "2026-07-08", event: "找林小哥做儲蓄險簡報"}
    ];

    function handleLogin() {
        const name = document.getElementById('login-name').value;
        const bday = document.getElementById('login-birthday').value;
        if(!name || !bday) return alert("請填寫驗證資訊");
        const numStr = bday.replace(/-/g, "");
        let sum = 0;
        for (let i = 0; i < numStr.length; i++) sum += parseInt(numStr[i]);
        while (sum > 9) { let temp = 0; let s = sum.toString(); for (let i = 0; i < s.length; i++) temp += parseInt(s[i]); sum = temp; }
        document.getElementById('top-memo-bar').innerHTML = `📝 <b>業務員：${name}</b> | ${destinyDatabase[sum]}`;
        document.getElementById('login-screen').style.display = "none";
        document.getElementById('main-system').style.display = "block";
        document.getElementById('global-home-btn').style.display = "block";
        document.getElementById('gemini-key').value = localStorage.getItem('ml_gemini_key') || "";
        init();
    }

    function logoutToHome() { document.getElementById('main-system').style.display = "none"; document.getElementById('global-home-btn').style.display = "none"; document.getElementById('login-screen').style.display = "block"; currentClassFilter = ''; }
    function saveApiKey() { localStorage.setItem('ml_gemini_key', document.getElementById('gemini-key').value.trim()); }
    
    function init() { drawFirstLevelTree(); renderClients(clients); renderCalendar(); }
    function switchPanel(panelId, btn) { document.querySelectorAll('.app-panel').forEach(p => p.classList.remove('active')); document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active')); document.getElementById(panelId).classList.add('active'); btn.classList.add('active'); }

    // 1. 繪製第一層大類別樹
    function drawFirstLevelTree() {
        currentClassFilter = '';
        document.getElementById('tree-title-text').innerText = "📊 第一層：全脈絡人脈類別樹";
        document.getElementById('tree-back-indicator').style.display = "none";
        document.querySelectorAll('.class-btn').forEach(b => b.classList.remove('active'));
        const canvas = document.getElementById('master-tree-canvas'); canvas.innerHTML = "";

        const meNode = document.createElement('div');
        meNode.style.cssText = "position:absolute; top:110px; left:165px; width:90px; padding:8px; background:var(--wine-red); color:white; border-radius:50%; font-size:12px; font-weight:bold; text-align:center; z-index:10;";
        meNode.innerText = "👑 羽毛"; canvas.appendChild(meNode);

        const classes = ['前同事', '同學', '親戚', '陌開', '轉介', '其他'];
        const positions = [[25, 30], [165, 15], [305, 30], [25, 200], [165, 215], [305, 200]];

        classes.forEach((cls, idx) => {
            const pos = positions[idx]; const count = clients.filter(c => c.clientClass === cls).length;
            const btnNode = document.createElement('div');
            btnNode.style.cssText = `position:absolute; left:${pos[0]}px; top:${pos[1]}px; width:95px; padding:6px 2px; background:#fff; border:2px solid var(--platinum-gold); border-radius:12px; font-size:11.5px; font-weight:bold; text-align:center; cursor:pointer; z-index:5;`;
            btnNode.innerHTML = `🌿 ${cls}<br><span style="color:var(--text-sub); font-size:10px;">(${count}人佈局)</span>`;
            btnNode.onclick = () => filterByClass(cls); canvas.appendChild(btnNode);
            drawCanvasLine(canvas, 210, 140, pos[0]+47, pos[1]+20);
        });
    }

    // 2. 深入第二層客戶與家人連線網絡樹
    function filterByClass(className) {
        currentClassFilter = className;
        document.querySelectorAll('.class-btn').forEach(b => b.classList.remove('active'));
        const classMap = { '前同事': 'f-colleague', '同學': 'f-classmate', '親戚': 'f-relative', '陌開': 'f-stranger', '轉介': 'f-referral', '其他': 'f-other' };
        if(classMap[className]) document.getElementById(classMap[className]).classList.add('active');

        document.getElementById('tree-title-text').innerText = `📊 第二層：【${className}】人脈樹鏈`;
        document.getElementById('tree-back-indicator').style.display = "inline";

        const canvas = document.getElementById('master-tree-canvas'); canvas.innerHTML = "";
        const classCenterNode = document.createElement('div');
        classCenterNode.style.cssText = "position:absolute; top:110px; left:160px; width:100px; padding:8px; background:var(--navy-premium); color:white; border-radius:14px; font-size:12px; font-weight:bold; text-align:center; z-index:10; border:1px solid var(--platinum-gold);";
        classCenterNode.innerText = `🌿 ${className}`; canvas.appendChild(classCenterNode);

        const classClients = clients.filter(c => c.clientClass === className);
        if(classClients.length === 0) {
            canvas.innerHTML += `<div style="font-size:12px; color:gray; text-align:center; margin-top:70px; width:100%;">此分類目前無人脈樹。請在下方快速新增。</div>`;
            renderClients(clients); return;
        }

        const clientPositions = [[20, 40], [300, 40], [20, 170], [300, 170]];
        classClients.forEach((c, cIdx) => {
            if(cIdx >= clientPositions.length) return; const cPos = clientPositions[cIdx];
            const cNode = document.createElement('div');
            cNode.style.cssText = `position:absolute; left:${cPos[0]}px; top:${cPos[1]}px; width:100px; padding:5px; background:#fffdf7; border:1.5px solid var(--wine-red); border-radius:8px; font-size:11.5px; font-weight:bold; text-align:center; z-index:6;`;
            cNode.innerText = `👤 ${c.name}`; canvas.appendChild(cNode);
            drawCanvasLine(canvas, 210, 140, cPos[0]+50, cPos[1]+20);

            if(c.family) {
                const members = c.family.split(/[,，]/);
                members.forEach((m, mIdx) => {
                    if(mIdx > 1) return;
                    const offsetX = cPos[0] < 160 ? -15 : 115; const offsetY = mIdx === 0 ? -15 : 25;
                    const mNode = document.createElement('div');
                    mNode.style.cssText = `position:absolute; left:${cPos[0] + offsetX}px; top:${cPos[1] + offsetY}px; width:65px; padding:2px; background:#f8fafc; border:1px solid var(--text-sub); border-radius:4px; font-size:9.5px; text-align:center; z-index:4; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;`;
                    mNode.innerText = m.trim(); canvas.appendChild(mNode);
                    drawCanvasLine(canvas, cPos[0]+50, cPos[1]+20, cPos[0]+offsetX+32, cPos[1]+offsetY+10);
                });
            }
        });
        renderClients(clients);
    }

    function resetToFirstLevelTree() { drawFirstLevelTree(); renderClients(clients); }
    function drawCanvasLine(canvas, sX, sY, eX, eY) { const line = document.createElement('div'); line.style.cssText = `position:absolute; background:#ebdcd8; height:1px; z-index:1; transform-origin: top left;`; const dist = Math.sqrt((eX - sX) ** 2 + (eY - sY) ** 2); const angle = Math.atan2(eY - sY, eX - sX) * 180 / Math.PI; line.style.width = dist + "px"; line.style.left = sX + "px"; line.style.top = sY + "px"; line.style.transform = `rotate(${angle}deg)`; canvas.appendChild(line); }

    // 3. 客戶及資產模糊搜尋
    function searchClients() {
        const keyword = document.getElementById('search-input').value.toLowerCase().trim();
        if(!keyword) { renderClients(clients); return; }
        const filtered = clients.filter(c => c.name.toLowerCase().includes(keyword) || (c.phone && c.phone.includes(keyword)) || (c.address && c.address.toLowerCase().includes(keyword)) || (c.finance && c.finance.toLowerCase().includes(keyword)) || (c.visits && c.visits.some(v => v.detail.toLowerCase().includes(keyword))));
        renderClients(filtered, true);
    }

    function renderClients(dataSource, isSearching = false) {
        const list = document.getElementById('client-list-container'); list.innerHTML = "";
        if(!isSearching && !currentClassFilter) { list.innerHTML = `<div style="text-align:center; color:gray; font-size:12px; margin-top:10px;">💡 請先點擊上方標籤按鈕或樹狀圖分類。</div>`; return; }
        
        const displayData = isSearching ? dataSource : dataSource.filter(c => c.clientClass === currentClassFilter);
        displayData.forEach((c) => {
            const globalIndex = clients.indexOf(c);
            let intelHtml = "";
            const dimensions = ["背景地雷", "家系人脈", "財務資產", "決策主導", "競爭防線"];
            let missingIntel = [];
            
            dimensions.forEach((d, idx) => {
                let hasIt = c.intel && c.intel[idx];
                intelHtml += `<span class="intel-badge ${hasIt?'intel-yes':'intel-no'}">${hasIt?'✓':'✗'} ${d}</span>`;
                if(!hasIt) missingIntel.push(d);
            });

            let alertHtml = missingIntel.length > 0 ? `<div style="color:#b91c1c; background:#fef2f2; padding:6px; border-radius:6px; font-size:11px; margin-top:6px; font-weight:bold;">🚨 情報欠缺：尚缺乏【${missingIntel.join("、")}】情報！</div>` : `<div style="color:#166534; background:#f0fdf4; padding:6px; border-radius:6px; font-size:11px; margin-top:6px; font-weight:bold;">🏆 情報完美掌控！</div>`;

            let historyHtml = "";
            if(c.visits) c.visits.forEach(v => historyHtml += `<div class="history-item"><span class="history-date">📅 ${v.date}</span>${v.detail}</div>`);

            list.innerHTML += `
                <div class="client-item">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;">
                        <span style="font-size:15px; font-weight:bold; color:var(--navy-premium);">${c.name}</span>
                        <div style="display:flex; gap:4px;">
                            <button class="nav-btn" style="padding:4px 8px; font-size:11px; margin:0;" onclick="openEditModal(${globalIndex})">✏️ 戰略編輯</button>
                            <button class="nav-btn" style="padding:4px 8px; font-size:11px; margin:0;" onclick="openGenogram(${globalIndex})">📊 家系彈窗</button>
                        </div>
                    </div>
                    <div class="info-row"><span class="info-label">📞 電話：</span>${c.phone || '未掌握'} | <span class="info-label">📍 地址：</span>${c.address || '未掌握'}</div>
                    <div style="margin:6px 0;">${intelHtml}</div>
                    ${alertHtml}
                    <div class="biz-premium-box">
                        <div class="biz-title">💰 財務狀況：</div><div>${c.finance || '⚠️ 未掌握'}</div>
                        <div class="biz-title">⚖️ 決策核心：</div><div>${c.decision || '⚠️ 未掌握'}</div>
                        <div class="biz-title">⚔️ 同行競爭：</div><div>${c.competitor || '⚠️ 未掌握'}</div>
                    </div>
                    <div class="history-box"><div class="history-title">📈 歷程紀錄表時間軸</div>${historyHtml || '暫無面談紀錄歷程'}</div>
                    <button class="btn" style="background:#f1f5f9; color:#ef4444; padding:2px; font-size:11px; margin-top:8px; width:auto;" onclick="deleteClient(${globalIndex})">移除客戶</button>
                </div>
            `;
        });
        localStorage.setItem('ml_clients', JSON.stringify(clients));
    }

    function addClient() {
        const name = document.getElementById('c-name').value.trim(); const cls = document.getElementById('c-class').value; if(!name) return alert("請輸入客戶姓名");
        let intelArray = [document.getElementById('i-1').checked, document.getElementById('i-2').checked, document.getElementById('i-3').checked, document.getElementById('i-4').checked, document.getElementById('i-5').checked];
        let historyArray = []; const fv = document.getElementById('c-first-visit').value.trim();
        if(fv) historyArray.push({ date: new Date().toISOString().split('T')[0], detail: fv });

        clients.push({
            name, phone: document.getElementById('c-phone').value, address: document.getElementById('c-address').value, family: document.getElementById('c-family').value, clientClass: cls, finance: document.getElementById('c-finance').value, decision: document.getElementById('c-decision').value, competitor: document.getElementById('c-competitor').value, intel: intelArray, visits: historyArray
        });
        document.getElementById('c-name').value = ""; document.getElementById('c-family').value = ""; document.getElementById('c-first-visit').value = "";
        filterByClass(cls);
    }

    function openEditModal(globalIndex) {
        const c = clients[globalIndex]; document.getElementById('edit-index').value = globalIndex; document.getElementById('edit-name').value = c.name; document.getElementById('edit-phone').value = c.phone || ""; document.getElementById('edit-address').value = c.address || ""; document.getElementById('edit-family').value = c.family || ""; document.getElementById('edit-class').value = c.clientClass; document.getElementById('edit-finance').value = c.finance || ""; document.getElementById('edit-decision').value = c.decision || ""; document.getElementById('edit-competitor').value = c.competitor || ""; document.getElementById('edit-new-visit').value = "";
        for(let i=1; i<=5; i++) document.getElementById(`e-i-${i}`).checked = c.intel ? c.intel[i-1] : false;
        document.getElementById('edit-modal').style.display = "flex";
    }
    function closeEditModal() { document.getElementById('edit-modal').style.display = "none"; }
    function saveClientEdit() {
        const idx = document.getElementById('edit-index').value; const targetClass = document.getElementById('edit-class').value; const nv = document.getElementById('edit-new-visit').value.trim();
        if(nv) { if(!clients[idx].visits) clients[idx].visits = []; clients[idx].visits.push({ date: new Date().toISOString().split('T')[0], detail: nv }); }
        let intelArray = []; for(let i=1; i<=5; i++) intelArray.push(document.getElementById(`e-i-${i}`).checked);
        clients[idx].name = document.getElementById('edit-name').value; clients[idx].phone = document.getElementById('edit-phone').value; clients[idx].address = document.getElementById('edit-address').value; clients[idx].family = document.getElementById('edit-family').value; clients[idx].clientClass = targetClass; clients[idx].finance = document.getElementById('edit-finance').value; clients[idx].decision = document.getElementById('edit-decision').value; clients[idx].competitor = document.getElementById('edit-competitor').value; clients[idx].intel = intelArray;
        closeEditModal(); alert("大合體資料變更修改成功！"); filterByClass(targetClass);
    }

    // Excel智慧匯入與自訂欄位讀取
    function handleExcelSelect(e) {
        const file = e.target.files[0]; if (!file) return;
        const reader = new FileReader(); reader.onload = function(evt) {
            excelRawData = XLSX.utils.sheet_to_json(XLSX.read(evt.target.result, { type: 'binary' }).Sheets[XLSX.read(evt.target.result, { type: 'binary' }).SheetNames[0]], { header: 1 });
            if (excelRawData.length < 2) return alert("Excel 內容為空！");
            const headers = excelRawData[0]; const dropdowns = ['map-name', 'map-phone', 'map-address', 'map-family', 'map-memo'];
            dropdowns.forEach(id => {
                const select = document.getElementById(id); select.innerHTML = `<option value="">--自訂選擇--</option>`;
                headers.forEach((h, idx) => {
                    let s = ""; if(id==='map-name' && h.includes("名")) s="selected"; if(id==='map-phone' && h.includes("話")) s="selected"; if(id==='map-address' && h.includes("址")) s="selected"; if(id==='map-family' && h.includes("關係")) s="selected"; if(id==='map-memo' && h.includes("歷程")) s="selected";
                    select.innerHTML += `<option value="${idx}" ${s}>${h}</option>`;
                });
            });
            document.getElementById('mapping-box').style.display = "block";
        }; reader.readAsBinaryString(file);
    }
    function confirmExcelImport() {
        const iN = document.getElementById('map-name').value; const iP = document.getElementById('map-phone').value; const iA = document.getElementById('map-address').value; const iF = document.getElementById('map-family').value; const iM = document.getElementById('map-memo').value; if(!iN) return alert("姓名為必選！");
        let count = 0; for(let i = 1; i < excelRawData.length; i++) {
            const r = excelRawData[i]; if(!r[iN]) continue;
            let hArr = []; if(iM && r[iM]) hArr.push({ date: new Date().toISOString().split('T')[0], detail: String(r[iM]).trim() });
            clients.push({ name: String(r[iN]).trim(), phone: iP ? String(r[iP]||'') : "", address: iA ? String(r[iA]||'') : "", family: iF ? String(r[iF]||'') : "", clientClass: "其他", finance: "", decision: "", competitor: "", intel: [true, true, false, false, false], visits: hArr });
            count++;
        }
        alert(`智慧匯入 ${count} 筆，已收納至『其他』標籤。`); document.getElementById('mapping-box').style.display = "none"; filterByClass('其他');
    }

    // Gemini API 即時連線生成
    async function callGeminiLive() {
        const apiKey = document.getElementById('gemini-key').value.trim(); if(!apiKey) return alert("請先填入 Gemini API 金鑰！");
        const out = document.getElementById('topic-output'); const btn = document.getElementById('ai-gen-btn');
        out.innerText = "🔮 即時聯結雲端大腦生成中..."; btn.disabled = true;
        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                method: "POST", headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: `妳是金牌保險業務員胡曼黎。請針對【${currentTopicPrompt}】即時生成一則120字內的暖心破冰問候文案，自然帶出保單或關懷檢視需求。直接吐出內容，加Emoji。` }] }] })
            });
            const d = await res.json(); out.innerText = d.candidates[0].content.parts[0].text.trim();
        } catch (e) { out.innerText = "⚠️ 連線失敗，請確認金鑰或網路。"; } finally { btn.disabled = false; }
    }
    function changeTopic(p, btn) { document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); currentTopicPrompt = p; callGeminiLive(); }
    function copyTopic() { navigator.clipboard.writeText(document.getElementById('topic-output').innerText); alert('複製成功！'); }

    // 行事曆
    function renderCalendar() { const grid = document.getElementById('calendar-box'); grid.innerHTML = ""; for(let d=1; d<=31; d++) { const dateStr = `2026-07-${d.toString().padStart(2, '0')}`; grid.innerHTML += `<div class="calendar-day ${schedules.some(s=>s.date===dateStr)?'has-event':''}" onclick="showDayDetail('${dateStr}')">${d}</div>`; } }
    function showDayDetail(dateStr) { const box = document.getElementById('calendar-detail-box'); const evs = schedules.filter(s => s.date === dateStr); if(evs.length > 0) { let h = `<b>📅 ${dateStr} 行程：</b>`; evs.forEach(e => h += `<div>📍 ${e.event}</div>`); box.innerHTML = h; } else { box.innerHTML = `<b>📅 ${dateStr}</b><br>暫無行程。`; } }
    function addSchedule() { const d = document.getElementById('s-date').value; const e = document.getElementById('s-event').value; if(!d || !e) return alert("請輸入完整行程"); schedules.push({date:d, event:e}); renderCalendar(); showDayDetail(d); }
    function deleteClient(index) { if(confirm("確定移除？")) { clients.splice(index, 1); filterByClass(currentClassFilter); } }
    function openGenogram(gIdx) { const c = clients[gIdx]; document.getElementById('geno-title').innerText = `${c.name}家系譜`; const b = document.getElementById('geno-body'); b.innerHTML = `👑 ${c.name}<br>│<br>`; if(c.family) c.family.split(/[,，]/).forEach(m => b.innerHTML += `<span style="border:1px solid #ccc; padding:2px 6px; margin:2px; display:inline-block; font-size:12px;">${m.trim()}</span>`); document.getElementById('geno-modal').style.display = "flex"; }
    function closeGenoModal() { document.getElementById('geno-modal').style.display = "none"; }
    window.onload = function() { document.getElementById('login-screen').style.display = "block"; }
</script>
