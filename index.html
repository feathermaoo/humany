<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>胡曼黎全能手冊</title>
    <style>
        :root {
            --bg-color: #fbf7f4;
            --card-bg: #ffffff;
            --primary: #e88d8d;
            --primary-hover: #df7373;
            --text-main: #4a3e3d;
            --text-sub: #8c7b79;
            --border-dash: #ebdcd8;
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .phone-container {
            width: 100%;
            max-width: 412px;
            background: var(--card-bg);
            border: 4px solid var(--text-main);
            border-radius: 32px;
            padding: 24px;
            box-shadow: 8px 8px 0px var(--text-main);
            box-sizing: border-box;
        }

        header {
            text-align: center;
            border-bottom: 3px dashed var(--border-dash);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 24px;
            margin: 0;
            color: var(--text-main);
            letter-spacing: 1px;
        }

        .subtitle {
            font-size: 13px;
            color: var(--text-sub);
            margin-top: 5px;
        }

        /* 模組 4：每日能量與底氣 */
        .energy-section {
            background: #fff9f9;
            border: 2px solid var(--text-main);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 24px;
            box-shadow: 4px 4px 0px var(--text-main);
        }

        .energy-title {
            font-weight: bold;
            font-size: 14px;
            color: var(--primary);
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .refresh-btn {
            background: none;
            border: none;
            font-size: 12px;
            color: var(--text-sub);
            cursor: pointer;
            text-decoration: underline;
        }

        .compass-box {
            font-size: 15px;
            margin-bottom: 8px;
            font-weight: bold;
        }

        .gold-quote {
            font-size: 15px;
            line-height: 1.5;
            font-style: italic;
            color: var(--text-main);
            border-left: 4px solid var(--primary);
            padding-left: 10px;
            margin: 5px 0;
        }

        /* 模組 3：破冰話題產生器 */
        .topic-section {
            border-top: 2px dashed var(--border-dash);
            padding-top: 20px;
        }

        .section-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 12px;
        }

        .tag-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 16px;
        }

        .tag-btn {
            background: #f0f0f0;
            border: 2px solid var(--text-main);
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tag-btn.active {
            background: var(--primary);
            color: white;
            box-shadow: 2px 2px 0px var(--text-main);
        }

        .output-box {
            background: #fafafa;
            border: 2px solid var(--text-main);
            border-radius: 16px;
            padding: 16px;
            min-height: 100px;
            position: relative;
            box-shadow: inset 2px 2px 5px rgba0,0,0,0.05;
        }

        .output-content {
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
            margin-bottom: 35px;
        }

        .copy-btn {
            position: absolute;
            bottom: 12px;
            right: 12px;
            background: var(--text-main);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 5px 12px;
            font-size: 12px;
            cursor: pointer;
        }

        .copy-btn:hover {
            background: var(--primary);
        }
    </style>
</head>
<body>

<div class="phone-container">
    <header>
        <h1>胡曼黎 全能手冊</h1>
        <div class="subtitle">金牌保險業務的逆襲與自我修煉</div>
    </header>

    <!-- 模組 4：每日能量與底氣 -->
    <div class="energy-section">
        <div class="energy-title">
            <span>🛡️ 拜訪前的心理防護罩</span>
            <button class="refresh-btn" onclick="refreshEnergy()">刷新能量</button>
        </div>
        <div class="compass-box">🧭 今日幸運方位：<span id="compass-text" style="color: #df7373;">正東方</span></div>
        <div class="gold-quote" id="quote-text">「女性最大的保險，是經營好自己。今天不開單，明天吃路邊攤。打起精神出門！」</div>
    </div>

    <!-- 模組 3：破冰話題產生器 -->
    <div class="topic-section">
        <div class="section-title">🚀 破冰話題產生器</div>
        <div class="tag-container">
            <button class="tag-btn active" onclick="generateTopic('news', this)">🔥 熱門新聞</button>
            <button class="tag-btn" onclick="generateTopic('weather', this)">☀️ 當日天氣</button>
            <button class="tag-btn" onclick="generateTopic('insurance', this)">💼 保險議題</button>
            <button class="tag-btn" onclick="generateTopic('cancer', this)">🩺 癌症資訊</button>
            <button class="tag-btn" onclick="generateTopic('finance', this)">📈 財經熱門</button>
        </div>
        <div class="output-box">
            <div class="output-content" id="output-text">最近看新聞發現高通膨時代大家都在討論怎麼抗通膨，突然想到妳，最近工作還順利嗎？找時間一起喝杯咖啡，跟妳分享幾個實用的理財防禦小撇步呀！</div>
            <button class="copy-btn" onclick="copyText()">一鍵複製</button>
        </div>
    </div>
</div>

<script>
    // 曼黎金句庫
    const quotes = [
        "「女性最大的保險，是經營好自己。今天不開單，明天吃路變攤。打起精神出門！」",
        "「客戶拒絕妳不是討厭妳，是討厭不夠專業的妳。今天給我把專業拿出來，出陣！」",
        "「人情世故就是妳的財富。把客戶當家人照顧，業績自然會開花結果！」",
        "「與其等待機會，不如自己去敲門。曼黎字典裡，從來沒有放棄這兩個字！」",
        "「每天比別人多訪一個客戶，兩週後妳看世界的角度就會完全不一樣！」"
    ];

    const compasses = ["正東方（貴人相助）", "正南方（簽約大吉）", "西北方（破冰順利）", "東北方（財運亨通）", "正西方（思緒清晰）"];

    // 破冰話題庫（模擬 AI 生成）
    const topicDatabase = {
        news: "最近看新聞發現高通膨時代大家都在討論怎麼抗通膨，突然想到妳，最近工作還順利嗎？找時間一起喝杯咖啡，跟妳分享幾個實用的理財防禦小撇步呀！☕️",
        weather: "哈囉！今天天氣突然變得很悶熱/下大雨，出門記得多喝水/帶把傘喔！最近剛好是新一季保單檢視的季節，出門在外注意安全的同時，也別忘了關心一下自己的保障喔～安全第一！平安是福❤️",
        insurance: "姐！最近很多客戶都在問醫療險改革的事情，大家都卡在額度不夠用。我剛好幫妳的保障做了一張視覺對比圖，看這週四或週五哪天方便，我過去幫妳分析一下，讓妳買得安心不踩雷！📊",
        cancer: "妳知道嗎？最近健保新藥的新聞炒得很熱，很多新型癌症癌症標靶藥物動輒上百萬，真的讓人很有感。其實提早規劃好防癌與重大傷病，就是對家人最負責任的愛。最近有空讓我幫妳看看目前的規劃有沒有漏洞嗎？❤️",
        finance: "最近美股和台股波動真的蠻大的，很多人都在聊資產配置。其實在這種市場下，有一筆穩定增值、不受市場影響的配置才是最安心的底氣。這幾天找時間聊聊，我幫妳看看怎麼鎖住資產吧！📈"
    };

    // 刷新能量與金句
    function refreshEnergy() {
        const randomQuote = quotes[Math.floor(Math.random() * quotes.length)];
        const randomCompass = compasses[Math.floor(Math.random() * compasses.length)];
        document.getElementById('quote-text').innerText = randomQuote;
        document.getElementById('compass-text').innerText = randomCompass;
    }

    // 切換標籤生成破冰文案
    function generateTopic(type, element) {
        // 切換按鈕 active 樣式
        const buttons = document.querySelectorAll('.tag-btn');
        buttons.forEach(btn => btn.classList.remove('active'));
        element.classList.add('active');

        // 更換內容
        document.getElementById('output-text').innerText = topicDatabase[type];
    }

    // 一鍵複製功能
    function copyText() {
        const text = document.getElementById('output-text').innerText;
        navigator.clipboard.writeText(text).then(() => {
            alert('曼黎提示：文案已複製成功，快去傳給客戶吧！🚀');
        }).catch(err => {
            alert('複製失敗，請手動複製');
        });
    }
</script>

</body>
</html>
